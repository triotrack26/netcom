<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Diagnostic Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#09090b',
                        darker: '#000000',
                        panel: '#18181b',
                        primary: '#06b6d4', // Cyan for a tech feel
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        terminal: '#22c55e'
                    },
                    fontFamily: {
                        mono: ['Consolas', 'Monaco', 'Courier New', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #000000; color: #f8fafc; overflow: hidden; user-select: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Terminal Typing Effect */
        .typing-line { border-right: 2px solid #22c55e; white-space: nowrap; overflow: hidden; animation: typing 1s steps(40, end), blink-caret .75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #22c55e; } }

        /* Full Keyboard Styles */
        .kbd-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 6px; }
        .key { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 0 #27272a; border: 1px solid #3f3f46; border-radius: 6px; background-color: #18181b; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; color: #a1a1aa; cursor: pointer; }
        .key.active { background-color: #06b6d4; color: white; transform: translateY(4px); box-shadow: 0 0 0 #27272a; border-color: #06b6d4; }
        .key.tested { background-color: #10b981; color: white; box-shadow: 0 4px 0 #047857; border-color: #059669; }
        .key.tested.active { transform: translateY(4px); box-shadow: 0 0 0 #047857; }
        
        /* Key Sizing */
        .k-std { width: 45px; height: 45px; }
        .k-sm { width: 40px; height: 35px; font-size: 0.65rem; }
        .k-w1 { width: 65px; height: 45px; } /* Tab */
        .k-w2 { width: 85px; height: 45px; } /* Caps */
        .k-w3 { width: 105px; height: 45px; } /* Shift L */
        .k-w4 { width: 125px; height: 45px; } /* Enter / Shift R */
        .k-space { width: 300px; height: 45px; }

        /* Port Indicators */
        .port-light { transition: all 0.3s ease; }
        .port-light.on { background-color: rgba(16, 185, 129, 0.2); border-color: #10b981; color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); }

        /* Fullscreen Display Test */
        #display-test-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; cursor: pointer; }

        /* Touch Test Canvas */
        #touch-canvas { touch-action: none; background-color: #09090b; border: 2px dashed #3f3f46; border-radius: 0.5rem; width: 100%; height: 400px; cursor: crosshair; }
    </style>
</head>
<body class="h-screen w-screen flex">

    <nav id="sidebar" class="w-64 bg-dark border-r border-zinc-800 flex flex-col h-full z-10">
        <div class="p-6 border-b border-zinc-800 flex items-center gap-3 cursor-pointer group" onclick="app.navigate('home')">
            <i class="fa-solid fa-microchip text-primary text-3xl group-hover:rotate-12 transition-transform"></i>
            <div>
                <h1 class="text-xl font-bold tracking-wider leading-tight">DIAGNOSTIC</h1>
                <h1 class="text-sm font-semibold tracking-widest text-primary">ENGINE OS</h1>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto py-6">
            <ul class="space-y-2 px-4" id="nav-menu">
                <li><button onclick="app.navigate('home')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-white transition-all font-medium tracking-wide" data-nav="home"><i class="fa-solid fa-layer-group w-5"></i> Select Device</button></li>
                <li class="pt-6 pb-2 px-4 text-xs font-bold text-zinc-600 uppercase tracking-widest">Test Environments</li>
                <li><button onclick="app.navigate('laptop')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-white transition-all font-medium tracking-wide" data-nav="laptop"><i class="fa-solid fa-laptop w-5"></i> Laptop Suite</button></li>
                <li><button onclick="app.navigate('desktop')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-white transition-all font-medium tracking-wide" data-nav="desktop"><i class="fa-solid fa-desktop w-5"></i> Desktop Suite</button></li>
                <li><button onclick="app.navigate('server')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-white transition-all font-medium tracking-wide" data-nav="server"><i class="fa-solid fa-server w-5"></i> Server Suite</button></li>
            </ul>
        </div>
        <div class="p-4 bg-zinc-900 border-t border-zinc-800 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-success animate-pulse"></div>
                <span class="text-xs font-bold text-zinc-400 tracking-wider">SYSTEM ACTIVE</span>
            </div>
            <i class="fa-solid fa-wifi text-zinc-500 text-xs" id="wifi-icon"></i>
        </div>
    </nav>

    <main class="flex-1 flex flex-col h-full bg-darker relative overflow-hidden">
        <!-- Topbar -->
        <header id="topbar" class="h-16 bg-dark border-b border-zinc-800 flex items-center justify-between px-8 z-10 shadow-lg">
            <h2 id="page-title" class="text-lg font-bold text-zinc-100 uppercase tracking-wider flex items-center gap-3">
                Select Hardware Profile
            </h2>
            <div class="flex items-center gap-6">
                <span id="system-clock" class="text-sm font-mono font-bold text-primary bg-primary/10 px-3 py-1 rounded border border-primary/20">00:00:00</span>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="main-content" class="flex-1 overflow-y-auto p-8 scrollbar-hide relative">
            <!-- Content gets injected here by JS -->
        </div>
    </main>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <!-- Fullscreen Display Test Overlay -->
    <div id="display-test-overlay"></div>

    <script>
        const app = {
            state: {
                currentView: 'home',
                activeStreams: [], // Holds camera/mic tracks for cleanup
                audioRecorder: null,
                audioChunks: [],
                portsConnected: 0 // Track connected virtual ports
            },

            // Test Definitions per device
            tests: {
                laptop: [
                    { id: 'sysinfo', name: 'Auto System Scan', icon: 'fa-radar-centric' },
                    { id: 'keyboard', name: 'Keyboard Intercept', icon: 'fa-keyboard' },
                    { id: 'touchpad', name: 'Trackpad Test', icon: 'fa-mouse-pointer' },
                    { id: 'touchscreen', name: 'Digitizer Touch', icon: 'fa-hand-pointer' },
                    { id: 'battery', name: 'Battery Analyzer', icon: 'fa-car-battery' },
                    { id: 'display', name: 'Screen Pixel Test', icon: 'fa-display' },
                    { id: 'ports', name: 'Live Port Listener', icon: 'fa-hubspot' },
                    { id: 'camera', name: 'Webcam Sensor', icon: 'fa-camera' },
                    { id: 'mic', name: 'Mic Visualizer', icon: 'fa-microphone-lines' },
                    { id: 'voice', name: 'Voice Recorder', icon: 'fa-voicemail' },
                    { id: 'speaker', name: 'Audio Channels', icon: 'fa-volume-high' }
                ],
                desktop: [
                    { id: 'sysinfo', name: 'Auto System Scan', icon: 'fa-radar-centric' },
                    { id: 'keyboard', name: 'Keyboard Intercept', icon: 'fa-keyboard' },
                    { id: 'mouse', name: 'Mouse Tracker', icon: 'fa-mouse' },
                    { id: 'monitor', name: 'Monitor Pixel Test', icon: 'fa-desktop' },
                    { id: 'ports', name: 'Live Port Listener', icon: 'fa-hubspot' },
                    { id: 'mic', name: 'Mic Visualizer', icon: 'fa-microphone-lines' },
                    { id: 'voice', name: 'Voice Recorder', icon: 'fa-voicemail' },
                    { id: 'speaker', name: 'Audio Channels', icon: 'fa-volume-high' }
                ],
                server: [
                    { id: 'sysinfo', name: 'Auto System Scan', icon: 'fa-radar-centric' },
                    { id: 'network', name: 'Network Latency', icon: 'fa-network-wired' }
                ]
            },

            utils: {
                showToast: (msg, type = 'info') => {
                    const container = document.getElementById('toast-container');
                    const toast = document.createElement('div');
                    
                    let bg = 'bg-zinc-800', border = 'border-primary', icon = 'fa-info-circle', text = 'text-primary';
                    if(type === 'success') { bg = 'bg-emerald-950'; border = 'border-emerald-500'; icon = 'fa-check-circle'; text = 'text-emerald-400'; }
                    if(type === 'error') { bg = 'bg-red-950'; border = 'border-red-500'; icon = 'fa-triangle-exclamation'; text = 'text-red-400'; }
                    
                    toast.className = `${bg} ${border} border px-6 py-4 rounded-lg shadow-2xl fade-in flex items-center gap-4 pointer-events-auto`;
                    toast.innerHTML = `<i class="fa-solid ${icon} ${text} text-2xl"></i> <span class="font-bold text-white tracking-wide">${msg}</span>`;
                    container.appendChild(toast);
                    
                    setTimeout(() => {
                        toast.style.opacity = '0';
                        toast.style.transition = 'opacity 0.3s';
                        setTimeout(() => toast.remove(), 300);
                    }, 4000);
                },
                stopActiveHardware: () => {
                    // Stop Camera/Mic
                    app.state.activeStreams.forEach(stream => stream.getTracks().forEach(track => track.stop()));
                    app.state.activeStreams = [];
                    // Stop Recorders
                    if(app.state.audioRecorder && app.state.audioRecorder.state !== 'inactive') app.state.audioRecorder.stop();
                    // Clean global listeners for tests
                    if(window.appKeyboardListener) {
                        window.removeEventListener('keydown', window.appKeyboardListener, true);
                        window.removeEventListener('keyup', window.appKeyboardUpListener, true);
                        window.appKeyboardListener = null;
                    }
                    if(window.usbListener) navigator.usb?.removeEventListener('connect', window.usbListener);
                    if(window.mediaListener) navigator.mediaDevices?.removeEventListener('devicechange', window.mediaListener);
                }
            },

            navigate: (viewName, params = {}) => {
                app.utils.stopActiveHardware();
                app.state.currentView = viewName;
                
                // Sidebar highlighting
                document.querySelectorAll('#nav-menu button').forEach(btn => {
                    btn.classList.remove('bg-primary/10', 'text-white', 'border-l-4', 'border-primary');
                    btn.classList.add('text-zinc-400');
                    if(btn.dataset.nav === viewName.split('-')[0]) {
                        btn.classList.remove('text-zinc-400');
                        btn.classList.add('bg-primary/10', 'text-white', 'border-l-4', 'border-primary');
                    }
                });

                const contentDiv = document.getElementById('main-content');
                
                if(viewName === 'home') app.ui.renderHome();
                else if(viewName === 'laptop' || viewName === 'desktop' || viewName === 'server') app.ui.renderDeviceMenu(viewName);
                else if(viewName === 'test') app.ui.renderActiveTest(params.device, params.testId);
            },

            ui: {
                renderHome: () => {
                    document.getElementById('page-title').innerHTML = `<i class="fa-solid fa-layer-group text-primary"></i> Select Hardware Profile`;
                    document.getElementById('main-content').innerHTML = `
                        <div class="fade-in max-w-5xl mx-auto flex flex-col items-center justify-center min-h-[75vh]">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full">
                                <div onclick="app.navigate('laptop')" class="bg-panel p-10 rounded-2xl border border-zinc-800 hover:border-primary cursor-pointer transition-all group text-center shadow-xl hover:shadow-primary/10 hover:-translate-y-2">
                                    <div class="w-24 h-24 mx-auto bg-zinc-900 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                        <i class="fa-solid fa-laptop text-5xl text-zinc-500 group-hover:text-primary transition-colors"></i>
                                    </div>
                                    <h3 class="text-2xl font-bold text-white tracking-wide">Laptop</h3>
                                    <p class="text-zinc-500 mt-3 text-sm font-medium">Integrated Battery, Trackpad, Wi-Fi & Touchscreens</p>
                                </div>
                                <div onclick="app.navigate('desktop')" class="bg-panel p-10 rounded-2xl border border-zinc-800 hover:border-primary cursor-pointer transition-all group text-center shadow-xl hover:shadow-primary/10 hover:-translate-y-2">
                                    <div class="w-24 h-24 mx-auto bg-zinc-900 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                        <i class="fa-solid fa-desktop text-5xl text-zinc-500 group-hover:text-primary transition-colors"></i>
                                    </div>
                                    <h3 class="text-2xl font-bold text-white tracking-wide">Desktop</h3>
                                    <p class="text-zinc-500 mt-3 text-sm font-medium">External Monitors, Peripherals & Deep I/O Testing</p>
                                </div>
                                <div onclick="app.navigate('server')" class="bg-panel p-10 rounded-2xl border border-zinc-800 hover:border-primary cursor-pointer transition-all group text-center shadow-xl hover:shadow-primary/10 hover:-translate-y-2">
                                    <div class="w-24 h-24 mx-auto bg-zinc-900 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                        <i class="fa-solid fa-server text-5xl text-zinc-500 group-hover:text-primary transition-colors"></i>
                                    </div>
                                    <h3 class="text-2xl font-bold text-white tracking-wide">Server Node</h3>
                                    <p class="text-zinc-500 mt-3 text-sm font-medium">Network Latency & Core Architecture Scan</p>
                                </div>
                            </div>
                        </div>
                    `;
                },

                renderDeviceMenu: (deviceType) => {
                    const title = deviceType.charAt(0).toUpperCase() + deviceType.slice(1) + " Diagnostic Suite";
                    document.getElementById('page-title').innerHTML = `<i class="fa-solid fa-microchip text-primary"></i> ${title}`;
                    const tests = app.tests[deviceType];
                    
                    let html = `<div class="fade-in max-w-6xl mx-auto pb-10">
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-4">`;
                    
                    tests.forEach((test) => {
                        html += `
                            <div onclick="app.navigate('test', {device: '${deviceType}', testId: '${test.id}'})" class="bg-panel border border-zinc-800 hover:border-primary rounded-xl p-6 cursor-pointer transition-all group flex flex-col items-center text-center shadow-lg hover:shadow-primary/5 hover:-translate-y-1">
                                <i class="fa-solid ${test.icon} text-4xl text-zinc-600 group-hover:text-primary transition-colors mb-4"></i>
                                <h3 class="text-lg font-bold text-zinc-200 tracking-wide">${test.name}</h3>
                            </div>
                        `;
                    });

                    html += `</div></div>`;
                    document.getElementById('main-content').innerHTML = html;
                },

                renderActiveTest: (device, testId) => {
                    const testDef = app.tests[device].find(t => t.id === testId);
                    
                    document.getElementById('page-title').innerHTML = `
                        <button onclick="app.navigate('${device}')" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-zinc-300 mr-4 transition-colors font-bold text-sm">
                            <i class="fa-solid fa-chevron-left mr-2"></i> BACK
                        </button> 
                        <span class="text-white">${testDef.name}</span>
                    `;

                    let testUI = `<div class="text-center text-zinc-600 font-mono mt-20">MODULE_NOT_FOUND</div>`;

                    if (testId === 'sysinfo') testUI = app.testTemplates.sysinfo();
                    else if (testId === 'battery') testUI = app.testTemplates.battery();
                    else if (testId === 'keyboard') testUI = app.testTemplates.fullKeyboard();
                    else if (testId === 'touchpad' || testId === 'mouse') testUI = app.testTemplates.mouse();
                    else if (testId === 'touchscreen') testUI = app.testTemplates.touchscreen();
                    else if (testId === 'display' || testId === 'monitor') testUI = app.testTemplates.display();
                    else if (testId === 'ports') testUI = app.testTemplates.ports();
                    else if (testId === 'camera') testUI = app.testTemplates.camera();
                    else if (testId === 'mic') testUI = app.testTemplates.mic();
                    else if (testId === 'voice') testUI = app.testTemplates.voice();
                    else if (testId === 'speaker') testUI = app.testTemplates.speaker();
                    else if (testId === 'network') testUI = app.testTemplates.network();

                    document.getElementById('main-content').innerHTML = `
                        <div class="fade-in max-w-5xl mx-auto h-full">
                            ${testUI}
                        </div>
                    `;

                    // Auto-Init Logic
                    setTimeout(() => {
                        if (testId === 'sysinfo') app.hardwareLogic.runSysInfoScan();
                        else if (testId === 'battery') app.hardwareLogic.initBattery();
                        else if (testId === 'keyboard') app.hardwareLogic.initFullKeyboard();
                        else if (testId === 'touchpad' || testId === 'mouse') app.hardwareLogic.initMouse();
                        else if (testId === 'touchscreen') app.hardwareLogic.initTouchscreen();
                        else if (testId === 'ports') app.hardwareLogic.initPorts();
                    }, 100);
                }
            },

            testTemplates: {
                sysinfo: () => `
                    <div class="bg-panel border border-zinc-800 rounded-xl overflow-hidden shadow-2xl">
                        <div class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex justify-between items-center">
                            <div class="flex gap-2"><div class="w-3 h-3 rounded-full bg-red-500"></div><div class="w-3 h-3 rounded-full bg-yellow-500"></div><div class="w-3 h-3 rounded-full bg-green-500"></div></div>
                            <span class="font-mono text-sm text-zinc-500">engine-sys-scan.exe</span>
                        </div>
                        <div class="p-6">
                            <button onclick="app.hardwareLogic.runSysInfoScan()" class="mb-6 px-6 py-3 bg-primary hover:bg-cyan-400 text-darker font-bold rounded shadow-[0_0_15px_rgba(6,182,212,0.4)] transition-all flex items-center gap-3">
                                <i class="fa-solid fa-radar-centric fa-spin-pulse"></i> INITIATE HARDWARE SCAN
                            </button>
                            <div id="sysinfo-terminal" class="font-mono text-sm text-terminal bg-black p-6 rounded border border-zinc-800 h-96 overflow-y-auto whitespace-pre-wrap leading-relaxed shadow-inner">
> Ready to scan hardware environment...
                            </div>
                        </div>
                    </div>`,

                battery: () => `
                    <div class="bg-panel border border-zinc-800 rounded-xl p-8 shadow-2xl">
                        <div class="text-center mb-8">
                            <i class="fa-solid fa-car-battery text-5xl text-primary mb-4"></i>
                            <h3 class="text-2xl font-bold text-white tracking-wide">Deep Battery Analyzer</h3>
                            <p class="text-zinc-500 font-medium mt-2">Checking cell integrity and discharge rate.</p>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 bg-black p-6 rounded-lg border border-zinc-800">
                            <div class="flex flex-col items-center justify-center border-r border-zinc-800 pr-4">
                                <div class="relative w-48 h-24 border-4 border-zinc-600 rounded-xl mx-auto mb-6 p-1 flex shadow-inner">
                                    <div class="absolute -right-4 top-1/2 -translate-y-1/2 w-3 h-10 bg-zinc-600 rounded-r-md"></div>
                                    <div id="bat-level" class="h-full bg-zinc-800 rounded-md transition-all duration-1000" style="width: 0%"></div>
                                    <div id="bat-text" class="absolute inset-0 flex items-center justify-center font-bold text-white text-3xl z-10 drop-shadow-md font-mono">--%</div>
                                </div>
                                <div id="bat-status" class="text-zinc-400 font-mono font-bold bg-zinc-900 border border-zinc-800 px-6 py-3 rounded-lg flex items-center gap-3"><i class="fa-solid fa-spinner fa-spin"></i> Analyzing Sensors...</div>
                            </div>
                            
                            <div class="space-y-4 font-mono text-sm flex flex-col justify-center">
                                <div class="flex justify-between border-b border-zinc-800 pb-2"><span class="text-zinc-500">API Access:</span><span class="text-success font-bold">GRANTED</span></div>
                                <div class="flex justify-between border-b border-zinc-800 pb-2"><span class="text-zinc-500">Time to Empty:</span><span id="bat-empty" class="text-white font-bold">Calculating...</span></div>
                                <div class="flex justify-between border-b border-zinc-800 pb-2"><span class="text-zinc-500">Time to Full:</span><span id="bat-full" class="text-white font-bold">Calculating...</span></div>
                                <div class="flex justify-between border-b border-zinc-800 pb-2"><span class="text-zinc-500">Physical Cycle Count:</span><span class="text-warning font-bold">OS LOCKED</span></div>
                                <div class="flex justify-between pt-2"><span class="text-zinc-500">Est. Health Status:</span><span id="bat-health" class="text-white font-bold">Unknown</span></div>
                            </div>
                        </div>
                    </div>`,

                fullKeyboard: () => `
                    <div class="bg-panel border border-zinc-800 rounded-xl p-6 text-center shadow-2xl">
                        <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4 mb-8 inline-block">
                            <p class="text-zinc-300 font-medium flex items-center gap-3">
                                <i class="fa-solid fa-shield-halved text-primary text-xl"></i>
                                Strict Intercept Mode Active. Browser shortcuts are blocked.
                            </p>
                        </div>
                        
                        <div id="keyboard-container" class="bg-black p-8 rounded-xl border border-zinc-800 inline-block overflow-x-auto max-w-full shadow-inner">
                            <!-- Generated by JS -->
                        </div>
                        
                        <div class="mt-8">
                            <button onclick="app.hardwareLogic.initFullKeyboard()" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 hover:border-zinc-500 text-white font-bold rounded-lg transition-all"><i class="fa-solid fa-rotate-right mr-2 text-primary"></i> Reset Grid</button>
                        </div>
                    </div>`,

                mouse: () => `
                    <div class="bg-panel border border-zinc-800 rounded-xl p-8 text-center shadow-2xl">
                        <h3 class="text-2xl text-white font-bold mb-2">Input & Tracker Verification</h3>
                        <p class="text-zinc-500 font-medium mb-8">Move pointer, click all buttons, and scroll inside the active zone.</p>
                        
                        <div id="mouse-area" class="w-full h-80 bg-black border-2 border-dashed border-zinc-700 hover:border-primary rounded-xl relative overflow-hidden mb-8 cursor-crosshair flex items-center justify-center flex-col select-none group transition-colors">
                            <i class="fa-solid fa-crosshairs text-7xl text-zinc-800 group-hover:text-zinc-700 transition-colors mb-4"></i>
                            <div id="mouse-trail" class="absolute w-4 h-4 bg-primary rounded-full pointer-events-none opacity-0 transition-opacity z-10 shadow-[0_0_15px_#06b6d4]"></div>
                        </div>
                        <div class="flex justify-center gap-6 font-mono text-lg font-bold">
                            <div id="m-left" class="w-40 py-4 bg-zinc-900 rounded-lg text-zinc-500 border border-zinc-800 transition-all">L-CLICK</div>
                            <div id="m-scroll" class="w-40 py-4 bg-zinc-900 rounded-lg text-zinc-500 border border-zinc-800 transition-all">SCROLL</div>

                                const p = Math.round(battery.level * 100);
                                lvl.style.width = `${p}%`;

                                // Color logic

                                // Detailed metrics
                                eTime.innerText = battery.dischargingTime !== Infinity ? Math.round(battery.dischargingTime/60) + ' mins' : 'N/A';

                            updateBat();
                            battery.addEventListener('levelchange', updateBat);
                            battery.addEventListener('chargingchange', updateBat);
                            battery.addEventListener('dischargingtimechange', updateBat);
                            battery.addEventListener('chargingtimechange', updateBat);

                    if(window.appKeyboardListener) {
                        window.removeEventListener('keydown', window.appKeyboardListener, true);
                        window.removeEventListener('keyup', window.appKeyboardUpListener, true);
                    }

                    // Strict Intercept
                    window.appKeyboardListener = (e) => {
                        e.preventDefault(); 
                        e.stopPropagation();
                        
                        let targetId = e.code;
                        if(e.key.length === 1 && e.key.match(/[a-z]/i)) targetId = e.key.toUpperCase();
                        else if(e.key >= '0' && e.key <= '9') targetId = e.key;
                        else if(['`','-','=','[',']','\\',';','\'',',','.','/'].includes(e.key)) targetId = e.key;

                        const el = document.getElementById(`key-${targetId}`) || document.getElementById(`key-${e.code}`);
                        if(el) {

                        e.stopPropagation();
                        let targetId = e.code;
                        if(e.key.length === 1 && e.key.match(/[a-z]/i)) targetId = e.key.toUpperCase();

                initMouse: () => {

                    area.onmousemove = (e) => {
                        const rect = area.getBoundingClientRect();
                        trail.style.opacity = '1';
                        trail.style.left = `${e.clientX - rect.left - 8}px`;

                        window.mouseTrailTimeout = setTimeout(() => trail.style.opacity = '0', 100);
                    };

                    area.onmousedown = (e) => {
                        if(e.button === 0) activateBtn('m-left');

                        if(e.button === 1) activateBtn('m-scroll');

                },

                initTouchscreen: () => {
                    const canvas = document.getElementById('touch-canvas');
                    if(!canvas) return;
                    const ctx = canvas.getContext('2d');
                    
                    const resize = () => {
                        canvas.width = canvas.parentElement.clientWidth - 48;
                        canvas.height = 400;
                        ctx.fillStyle = "#09090b";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    };
                    resize();
                    window.addEventListener('resize', resize);

                    let isDrawing = false;
                    const startPos = (e) => { isDrawing = true; draw(e); };
                    const endPos = () => { isDrawing = false; ctx.beginPath(); };

                    const draw = (e) => {
                        if(!isDrawing) return;
                        e.preventDefault();
                        ctx.lineWidth = 6;
                        ctx.lineCap = 'round';
                        ctx.strokeStyle = '#06b6d4'; // Primary cyan
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = '#06b6d4';

                        const rect = canvas.getBoundingClientRect();
                        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
                        let clientY = e.clientY || (e.touches && e.touches[0].clientY);

                        ctx.lineTo(clientX - rect.left, clientY - rect.top);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(clientX - rect.left, clientY - rect.top);
                    };

                    canvas.addEventListener('touchstart', startPos);
                    canvas.addEventListener('touchend', endPos);
                    canvas.addEventListener('touchmove', draw);
                    canvas.addEventListener('mousedown', startPos);
                    canvas.addEventListener('mouseup', endPos);
                    canvas.addEventListener('mousemove', draw);
                    
                    app.hardwareLogic.clearCanvas = () => {
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = "#09090b";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    };
                },

                initPorts: () => {

                        if(app.state.portsConnected < ports.length) {
                            ports[app.state.portsConnected].classList.add('on');
                            app.state.portsConnected++;
                            app.hardwareLogic.playTone(880, 'both', 'sine', 0.1);
                            setTimeout(() => app.hardwareLogic.playTone(1100, 'both', 'sine', 0.15), 150);
                            app.utils.showToast("Hardware Interrupt Detected", "success");
                        }
                    };

                    // Listen for Media Devices (Headsets, Webcams)
                    window.mediaListener = async () => triggerPort();
                    navigator.mediaDevices?.addEventListener('devicechange', window.mediaListener);

                    // Listen for WebUSB if available
                    if(navigator.usb) {
                        window.usbListener = () => triggerPort();
                        navigator.usb.addEventListener('connect', window.usbListener);
                    } else {
                        // Fallback polling for generic controllers if strict USB API blocked
                        let lastGamepadCount = 0;
                        setInterval(() => {
                            if(app.state.currentView !== 'test') return;

                    }
                },

                startDisplayTest: () => {
                    const overlay = document.getElementById('display-test-overlay');
                    const colors = ['#FF0000', '#00FF00', '#0000FF', '#FFFFFF', '#000000'];
                    let idx = 0;
                    
                    overlay.style.display = 'block';
                    overlay.style.backgroundColor = colors[idx];
                    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});

                    overlay.onclick = () => {
                        idx++;
                        if (idx >= colors.length) {
                            overlay.style.display = 'none';
                            if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
                        } else {
                            overlay.style.backgroundColor = colors[idx];
                        }
                    };

                    window.appEscapeListener = (e) => {
                        if (e.key === 'Escape') {
                            overlay.style.display = 'none';
                            if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
                            window.removeEventListener('keydown', window.appEscapeListener);
                        }
                    };
                    window.addEventListener('keydown', window.appEscapeListener);
                },

                startCamera: async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: {ideal: 1920}, height: {ideal: 1080} } });
                        const video = document.getElementById('webcam-video');
                        const placeholder = document.getElementById('cam-placeholder');
                        video.srcObject = stream;
                        video.classList.remove('hidden');
                        placeholder.classList.add('hidden');
                        app.state.activeStreams.push(stream);
                    } catch (err) {
                        app.utils.showToast("Sensor access denied. Check hardware lock.", "error");
                    }
                },

                startMic: async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        app.state.activeStreams.push(stream);
                        
                        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        const analyser = audioContext.createAnalyser();
                        const microphone = audioContext.createMediaStreamSource(stream);
                        microphone.connect(analyser);
                        analyser.fftSize = 128;
                        const dataArray = new Uint8Array(analyser.frequencyBinCount);
                        
                        const visualizer = document.getElementById('audio-visualizer');
                        visualizer.innerHTML = '';
                        const bars = Array.from({length: 32}, () => {
                            const bar = document.createElement('div');
                            bar.className = 'w-full bg-primary rounded-t opacity-90 transition-all duration-75 shadow-[0_0_5px_rgba(6,182,212,0.5)]';
                            bar.style.height = '5%';
                            visualizer.appendChild(bar);
                            return bar;
                        });

                        const updateVisuals = () => {
                            if(app.state.currentView !== 'test' || !app.state.activeStreams.includes(stream)) return;
                            analyser.getByteFrequencyData(dataArray);
                            for(let i=0; i<32; i++) {
                                let val = dataArray[i * 2] / 255;
                                bars[i].style.height = `${Math.max(5, val * 100)}%`;
                                bars[i].style.backgroundColor = val > 0.85 ? '#ef4444' : (val > 0.6 ? '#f59e0b' : '#06b6d4');
                            }
                            requestAnimationFrame(updateVisuals);
                        };
                        updateVisuals();
                    } catch (err) {
                        app.utils.showToast("Array access denied.", "error");
                    }
                },

                startRecording: async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        app.state.activeStreams.push(stream);
                        app.state.audioChunks = [];
                        app.state.audioRecorder = new MediaRecorder(stream);
                        
                        app.state.audioRecorder.ondataavailable = e => {
                            if (e.data.size > 0) app.state.audioChunks.push(e.data);
                        };

                        app.state.audioRecorder.onstop = () => {
                            const audioBlob = new Blob(app.state.audioChunks, { type: 'audio/webm' });
                            const audioUrl = URL.createObjectURL(audioBlob);
                            const audioEl = document.getElementById('audio-playback');
                            audioEl.src = audioUrl;
                            document.getElementById('playback-container').classList.replace('hidden', 'flex');
                        };

                        app.state.audioRecorder.start();
                        document.getElementById('btn-record').classList.add('animate-pulse', 'shadow-[0_0_20px_rgba(220,38,38,0.8)]');
                        document.getElementById('btn-record').innerHTML = '<i class="fa-solid fa-circle text-xs align-middle mr-2"></i> Recording...';
                        document.getElementById('btn-stop').classList.remove('hidden');
                    } catch (err) {
                        app.utils.showToast("Mic access denied.", "error");
                    }
                },

                stopRecording: () => {
                    if(app.state.audioRecorder && app.state.audioRecorder.state !== 'inactive') {
                        app.state.audioRecorder.stop();
                        app.utils.stopActiveHardware(); // Cleanup streams immediately after record
                        document.getElementById('btn-record').classList.remove('animate-pulse', 'shadow-[0_0_20px_rgba(220,38,38,0.8)]');
                        document.getElementById('btn-record').innerHTML = '<i class="fa-solid fa-circle text-xs align-middle mr-2"></i> Record Again';
                        document.getElementById('btn-stop').classList.add('hidden');
                    }
                },

                testNetwork: async () => {
                    const url = document.getElementById('ping-target').value;
                    const log = document.getElementById('network-log');
                    log.innerHTML += `<br>> Sending packet to ${url}...`;
                    log.scrollTop = log.scrollHeight;
                    
                    try {
                        const start = performance.now();
                        await fetch(url, { mode: 'no-cors', cache: 'no-store' }); 
                        const end = performance.now();
                        log.innerHTML += `<br><span class="text-success">[OK] Reply received. Latency: ~${Math.round(end - start)}ms.</span>`;
                    } catch (e) {
                        log.innerHTML += `<br><span class="text-danger">[FAIL] Packet dropped. Check outbound firewall rules.</span>`;
                    }
                    log.scrollTop = log.scrollHeight;
                },

                playTone: (freq, pan, type='sine', duration=1) => {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const panner = ctx.createStereoPanner();
                    const gain = ctx.createGain();
                    
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    
                    if(pan === 'left') panner.pan.value = -1;
                    else if(pan === 'right') panner.pan.value = 1;
                    else panner.pan.value = 0;

                    gain.gain.setValueAtTime(0.5, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);

                    osc.connect(panner);
                    panner.connect(gain);
                    gain.connect(ctx.destination);

                    osc.start();
                    osc.stop(ctx.currentTime + duration);
                }
            }
        };

        window.onload = () => {
            app.navigate('home');
            
            // Network Status Indicator updates
            const updateNetwork = () => {
                const icon = document.getElementById('wifi-icon');
                if (navigator.onLine) {
                    icon.className = 'fa-solid fa-wifi text-primary text-xs drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]';
                } else {
                    icon.className = 'fa-solid fa-wifi-slash text-danger text-xs drop-shadow-[0_0_5px_rgba(239,68,68,0.8)]';
                    app.utils.showToast("Offline Mode Active", "warning");
                }
            };
            window.addEventListener('online', updateNetwork);
            window.addEventListener('offline', updateNetwork);
            updateNetwork();

            // Hardware Clock
            setInterval(() => {
                const el = document.getElementById('system-clock');
                if(el) el.innerText = new Date().toLocaleTimeString('en-US', { hour12: false });
            }, 1000);
        };
    </script>
</body>
</html>
