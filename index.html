<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCheck Pro - Hardware Diagnostic Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        darker: '#020617',
                        panel: '#1e293b',
                        primary: '#3b82f6',
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow: hidden; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Keyboard Test Styles */
        .key { transition: all 0.1s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); }
        .key.active { background-color: #3b82f6; color: white; transform: scale(0.95); box-shadow: none; }
        .key.tested { background-color: #10b981; color: white; border-color: #059669; }

        /* Fullscreen Display Test */
        #display-test-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; cursor: pointer; }
        
        /* Custom Checkbox */
        .cyber-checkbox { appearance: none; width: 1.5rem; height: 1.5rem; border: 2px solid #475569; border-radius: 0.25rem; background: #1e293b; cursor: pointer; position: relative; }
        .cyber-checkbox:checked { background: #10b981; border-color: #10b981; }
        .cyber-checkbox:checked::after { content: '✓'; position: absolute; color: white; font-weight: bold; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        @media print {
            body { background: white !important; color: black !important; overflow: auto; }
            #sidebar, #topbar, .no-print { display: none !important; }
            #main-content { margin: 0 !important; padding: 0 !important; width: 100% !important; height: auto !important; }
            .print-break { page-break-inside: avoid; }
            .bg-panel { background: white !important; border: 1px solid #e2e8f0; }
            * { box-shadow: none !important; }
        }
    </style>
</head>
<body class="h-screen w-screen flex">

    <nav id="sidebar" class="w-64 bg-dark border-r border-slate-800 flex flex-col h-full z-10 transition-all duration-300">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3">
            <i class="fa-solid fa-microchip text-primary text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wider">DevCheck<span class="text-primary">Pro</span></h1>
        </div>
        <div class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-2 px-3" id="nav-menu">
                <li><button onclick="app.navigate('dashboard')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-nav="dashboard"><i class="fa-solid fa-chart-line w-5"></i> Dashboard</button></li>
                <li class="pt-4 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Diagnostics</li>
                <li><button onclick="app.navigate('laptop')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-nav="laptop"><i class="fa-solid fa-laptop w-5"></i> Laptop Tests</button></li>
                <li><button onclick="app.navigate('desktop')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-nav="desktop"><i class="fa-solid fa-desktop w-5"></i> Desktop Tests</button></li>
                <li><button onclick="app.navigate('server')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-nav="server"><i class="fa-solid fa-server w-5"></i> Server Tests</button></li>
                <li class="pt-4 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Results</li>
                <li><button onclick="app.navigate('report')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-nav="report"><i class="fa-solid fa-file-pdf w-5"></i> Report Generator</button></li>
            </ul>
        </div>
        <div class="p-4 border-t border-slate-800 text-xs text-slate-500 text-center">
            v2.0.1 Engineer Edition
        </div>
    </nav>

    <main class="flex-1 flex flex-col h-full bg-darker relative overflow-hidden">
        <!-- Topbar -->
        <header id="topbar" class="h-16 bg-dark border-b border-slate-800 flex items-center justify-between px-6 z-10">
            <h2 id="page-title" class="text-xl font-semibold text-slate-100">Dashboard</h2>
            <div class="flex items-center gap-4">
                <span id="system-clock" class="text-sm font-mono text-slate-400">00:00:00</span>
                <button onclick="app.clearData()" class="px-3 py-1.5 bg-slate-800 hover:bg-danger text-white rounded text-sm transition-colors duration-200">Reset Session</button>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="main-content" class="flex-1 overflow-y-auto p-6 scrollbar-hide">
            <!-- Content gets injected here by JS -->
        </div>
    </main>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Fullscreen Display Test Overlay -->
    <div id="display-test-overlay"></div>

    <script>
        // --- Core Application Logic & State ---
        const app = {
            state: {
                currentView: 'dashboard',
                results: {
                    laptop: {},
                    desktop: {},
                    server: {}
                },
                deviceMeta: {
                    serialNumber: '',
                    engineerName: '',
                    date: new Date().toLocaleDateString()
                },
                activeStreams: [] // To hold camera/mic streams to stop them later
            },

            // Navigation mappings
            views: {
                dashboard: () => app.ui.renderDashboard(),
                laptop: () => app.ui.renderDeviceTests('laptop', 'Laptop Diagnostics'),
                desktop: () => app.ui.renderDeviceTests('desktop', 'Desktop Diagnostics'),
                server: () => app.ui.renderServerTests(),
                report: () => app.ui.renderReport(),
                testView: (device, testId) => app.ui.renderActiveTest(device, testId)
            },

            // Test Definitions
            tests: {
                laptop: [
                    { id: 'sysinfo', name: 'System Info', icon: 'fa-info-circle', type: 'auto' },
                    { id: 'camera', name: 'Webcam', icon: 'fa-camera', type: 'interactive' },
                    { id: 'mic', name: 'Microphone', icon: 'fa-microphone', type: 'interactive' },
                    { id: 'speaker', name: 'Speakers', icon: 'fa-volume-high', type: 'interactive' },
                    { id: 'keyboard', name: 'Keyboard', icon: 'fa-keyboard', type: 'interactive' },
                    { id: 'touchpad', name: 'Touchpad/Mouse', icon: 'fa-mouse-pointer', type: 'interactive' },
                    { id: 'battery', name: 'Battery Health', icon: 'fa-battery-half', type: 'auto' },
                    { id: 'display', name: 'Display (Dead Pixel)', icon: 'fa-display', type: 'interactive' },
                    { id: 'ports', name: 'Ports & I/O', icon: 'fa-usb', type: 'manual' }
                ],
                desktop: [
                    { id: 'sysinfo', name: 'System Info', icon: 'fa-info-circle', type: 'auto' },
                    { id: 'monitor', name: 'Monitor Test', icon: 'fa-desktop', type: 'interactive' },
                    { id: 'keyboard', name: 'Keyboard', icon: 'fa-keyboard', type: 'interactive' },
                    { id: 'mouse', name: 'Mouse Tracker', icon: 'fa-mouse', type: 'interactive' },
                    { id: 'speaker', name: 'Audio Output', icon: 'fa-volume-high', type: 'interactive' },
                    { id: 'ports', name: 'Ports & I/O', icon: 'fa-usb', type: 'manual' }
                ]
            },

            utils: {
                showToast: (msg, type = 'info') => {
                    const container = document.getElementById('toast-container');
                    const toast = document.createElement('div');
                    const colors = { info: 'bg-blue-600', success: 'bg-emerald-600', error: 'bg-red-600', warning: 'bg-amber-600' };
                    toast.className = `${colors[type]} text-white px-4 py-3 rounded shadow-lg fade-in flex items-center gap-3`;
                    
                    let icon = 'fa-info-circle';
                    if(type === 'success') icon = 'fa-check-circle';
                    if(type === 'error') icon = 'fa-exclamation-triangle';

                    toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${msg}</span>`;
                    container.appendChild(toast);
                    setTimeout(() => {
                        toast.style.opacity = '0';
                        setTimeout(() => toast.remove(), 300);
                    }, 3000);
                },
                stopActiveStreams: () => {
                    app.state.activeStreams.forEach(stream => stream.getTracks().forEach(track => track.stop()));
                    app.state.activeStreams = [];
                },
                saveResult: (device, testId, status, notes = '') => {
                    app.state.results[device][testId] = { status, notes, timestamp: new Date().toLocaleTimeString() };
                    app.utils.showToast(`Saved ${testId} status: ${status.toUpperCase()}`, status === 'pass' ? 'success' : (status === 'fail' ? 'error' : 'warning'));
                    // Update UI if we are in the device menu
                    const statusBadge = document.getElementById(`status-${testId}`);
                    if(statusBadge) {
                        statusBadge.className = `px-2 py-1 rounded text-xs font-bold uppercase ${status === 'pass' ? 'bg-emerald-500/20 text-emerald-400' : (status === 'fail' ? 'bg-red-500/20 text-red-400' : 'bg-slate-700 text-slate-300')}`;
                        statusBadge.innerText = status;
                    }
                },
                formatBytes: (bytes, decimals = 2) => {
                    if (!+bytes) return '0 Bytes';
                    const k = 1024, dm = decimals < 0 ? 0 : decimals, sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'], i = Math.floor(Math.log(bytes) / Math.log(k));
                    return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
                }
            },

            navigate: (viewName, params = {}) => {
                app.utils.stopActiveStreams(); // Clean up hardware usage
                app.state.currentView = viewName;
                
                // Update Sidebar Highlighting
                document.querySelectorAll('#nav-menu button').forEach(btn => {
                    btn.classList.remove('bg-primary', 'text-white');
                    btn.classList.add('text-slate-300', 'hover:bg-slate-800');
                    if(btn.dataset.nav === viewName.split('-')[0]) {
                        btn.classList.remove('text-slate-300', 'hover:bg-slate-800');
                        btn.classList.add('bg-primary', 'text-white');
                    }
                });

                const contentDiv = document.getElementById('main-content');
                contentDiv.innerHTML = '<div class="flex h-full items-center justify-center text-slate-500"><i class="fa-solid fa-spinner fa-spin text-4xl"></i></div>';
                
                setTimeout(() => {
                    if(viewName === 'test') {
                        app.views.testView(params.device, params.testId);
                    } else if (app.views[viewName]) {
                        app.views[viewName]();
                    }
                }, 50); // slight delay for smooth transition
            },

            clearData: () => {
                app.state.results = { laptop: {}, desktop: {}, server: {} };
                app.utils.showToast('Session reset successful', 'success');
                app.navigate('dashboard');
            },

            ui: {
                renderDashboard: () => {
                    document.getElementById('page-title').innerText = "Dashboard";
                    
                    // Calculate stats
                    let totalTests = 0;
                    let passed = 0;
                    let failed = 0;
                    ['laptop', 'desktop', 'server'].forEach(dev => {
                        Object.values(app.state.results[dev]).forEach(res => {
                            totalTests++;
                            if(res.status === 'pass') passed++;
                            if(res.status === 'fail') failed++;
                        });
                    });

                    document.getElementById('main-content').innerHTML = `
                        <div class="fade-in max-w-6xl mx-auto space-y-6">
                            
                            <div class="bg-panel p-6 rounded-xl border border-slate-700 mb-8">
                                <h3 class="text-lg font-semibold text-white mb-4">Engineer & Device Info</h3>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div>
                                        <label class="block text-sm text-slate-400 mb-1">Engineer Name</label>
                                        <input type="text" id="eng-name" class="w-full bg-dark border border-slate-700 rounded p-2 text-white focus:border-primary outline-none" value="${app.state.deviceMeta.engineerName}" placeholder="Enter Name..." onchange="app.state.deviceMeta.engineerName = this.value">
                                    </div>
                                    <div>
                                        <label class="block text-sm text-slate-400 mb-1">Device Serial/Tag</label>
                                        <input type="text" id="serial-num" class="w-full bg-dark border border-slate-700 rounded p-2 text-white focus:border-primary outline-none" value="${app.state.deviceMeta.serialNumber}" placeholder="e.g. LPT-4921" onchange="app.state.deviceMeta.serialNumber = this.value">
                                    </div>
                                    <div>
                                        <label class="block text-sm text-slate-400 mb-1">Date</label>
                                        <input type="text" class="w-full bg-dark border border-slate-700 rounded p-2 text-slate-500" value="${app.state.deviceMeta.date}" disabled>
                                    </div>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                                <div class="bg-panel p-6 rounded-xl border border-slate-700 flex flex-col justify-center items-center text-center">
                                    <div class="w-12 h-12 bg-blue-500/20 text-blue-400 rounded-full flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-vial"></i></div>
                                    <h4 class="text-3xl font-bold text-white">${totalTests}</h4>
                                    <p class="text-slate-400 text-sm">Tests Completed</p>
                                </div>
                                <div class="bg-panel p-6 rounded-xl border border-emerald-900/50 flex flex-col justify-center items-center text-center">
                                    <div class="w-12 h-12 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-check"></i></div>
                                    <h4 class="text-3xl font-bold text-emerald-400">${passed}</h4>
                                    <p class="text-slate-400 text-sm">Passed</p>
                                </div>
                                <div class="bg-panel p-6 rounded-xl border border-red-900/50 flex flex-col justify-center items-center text-center">
                                    <div class="w-12 h-12 bg-red-500/20 text-red-400 rounded-full flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-xmark"></i></div>
                                    <h4 class="text-3xl font-bold text-red-400">${failed}</h4>
                                    <p class="text-slate-400 text-sm">Failed</p>
                                </div>
                                <div class="bg-panel p-6 rounded-xl border border-slate-700 flex flex-col justify-center items-center text-center">
                                    <div class="w-12 h-12 bg-purple-500/20 text-purple-400 rounded-full flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-file-pdf"></i></div>
                                    <button onclick="app.navigate('report')" class="w-full mt-2 py-2 bg-primary hover:bg-blue-600 text-white rounded transition">Generate Report</button>
                                </div>
                            </div>

                            <h3 class="text-xl font-semibold mt-8 mb-4 border-b border-slate-700 pb-2">Quick Start</h3>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div onclick="app.navigate('laptop')" class="bg-panel p-6 rounded-xl border border-slate-700 hover:border-primary cursor-pointer transition-all group text-center">
                                    <i class="fa-solid fa-laptop text-5xl text-slate-500 group-hover:text-primary mb-4 transition-colors"></i>
                                    <h3 class="text-lg font-bold text-white">Laptop Diagnostics</h3>
                                    <p class="text-slate-400 text-sm mt-2">Webcam, Battery, Keyboard, Ports</p>
                                </div>
                                <div onclick="app.navigate('desktop')" class="bg-panel p-6 rounded-xl border border-slate-700 hover:border-primary cursor-pointer transition-all group text-center">
                                    <i class="fa-solid fa-desktop text-5xl text-slate-500 group-hover:text-primary mb-4 transition-colors"></i>
                                    <h3 class="text-lg font-bold text-white">Desktop Diagnostics</h3>
                                    <p class="text-slate-400 text-sm mt-2">Monitors, Peripherals, Audio</p>
                                </div>
                                <div onclick="app.navigate('server')" class="bg-panel p-6 rounded-xl border border-slate-700 hover:border-primary cursor-pointer transition-all group text-center">
                                    <i class="fa-solid fa-server text-5xl text-slate-500 group-hover:text-primary mb-4 transition-colors"></i>
                                    <h3 class="text-lg font-bold text-white">Server Diagnostics</h3>
                                    <p class="text-slate-400 text-sm mt-2">Network, Workload Simulation</p>
                                </div>
                            </div>
                        </div>
                    `;
                },

                renderDeviceTests: (deviceType, title) => {
                    document.getElementById('page-title').innerText = title;
                    const tests = app.tests[deviceType];
                    
                    let html = `<div class="fade-in max-w-5xl mx-auto"><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
                    
                    tests.forEach(test => {
                        const result = app.state.results[deviceType][test.id];
                        let statusUI = `<span id="status-${test.id}" class="px-2 py-1 rounded text-xs font-bold uppercase bg-slate-700 text-slate-300">Untested</span>`;
                        if(result) {
                            if(result.status === 'pass') statusUI = `<span id="status-${test.id}" class="px-2 py-1 rounded text-xs font-bold uppercase bg-emerald-500/20 text-emerald-400">Pass</span>`;
                            if(result.status === 'fail') statusUI = `<span id="status-${test.id}" class="px-2 py-1 rounded text-xs font-bold uppercase bg-red-500/20 text-red-400">Fail</span>`;
                        }

                        let typeTag = test.type === 'auto' ? '<i class="fa-solid fa-bolt text-yellow-500 text-xs" title="Auto Test"></i>' : 
                                     (test.type === 'interactive' ? '<i class="fa-solid fa-hand-pointer text-blue-400 text-xs" title="Interactive Test"></i>' : 
                                     '<i class="fa-solid fa-clipboard-check text-purple-400 text-xs" title="Manual Verification"></i>');

                        html += `
                            <div class="bg-panel border border-slate-700 rounded-xl p-5 hover:border-slate-500 transition-all flex flex-col">
                                <div class="flex justify-between items-start mb-4">
                                    <div class="w-10 h-10 rounded bg-dark flex items-center justify-center text-xl text-slate-300">
                                        <i class="fa-solid ${test.icon}"></i>
                                    </div>
                                    ${statusUI}
                                </div>
                                <h3 class="text-lg font-semibold text-white mb-1 flex items-center gap-2">${test.name} ${typeTag}</h3>
                                <p class="text-sm text-slate-400 mb-4 flex-1">Run diagnostics for ${test.name.toLowerCase()}.</p>
                                <button onclick="app.navigate('test', {device: '${deviceType}', testId: '${test.id}'})" class="w-full py-2 bg-dark hover:bg-primary text-white border border-slate-700 hover:border-primary rounded transition duration-200">
                                    Run Test
                                </button>
                            </div>
                        `;
                    });

                    html += `</div></div>`;
                    document.getElementById('main-content').innerHTML = html;
                },

                renderServerTests: () => {
                    document.getElementById('page-title').innerText = 'Server Diagnostics (Simulation)';
                    
                    let html = `
                    <div class="fade-in max-w-6xl mx-auto space-y-6">
                        <div class="bg-blue-900/20 border border-blue-800 text-blue-300 p-4 rounded flex items-start gap-3">
                            <i class="fa-solid fa-circle-info mt-1"></i>
                            <p class="text-sm"><strong>Note:</strong> Standard web browsers cannot directly query low-level server metrics (CPU Temp, RAM slots, physical disks). This interface simulates a server dashboard and provides tools for network pinging and manual validation which an engineer would use alongside SSH/IPMI.</p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Simulated Load -->
                            <div class="bg-panel border border-slate-700 rounded-xl p-6">
                                <h3 class="text-lg font-semibold mb-4 border-b border-slate-700 pb-2"><i class="fa-solid fa-microchip mr-2 text-primary"></i> Simulated CPU & RAM</h3>
                                <div class="space-y-4">
                                    <div>
                                        <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">CPU Usage (Mock)</span><span class="text-slate-100 font-mono" id="sim-cpu">12%</span></div>
                                        <div class="w-full bg-dark rounded-full h-2.5"><div class="bg-primary h-2.5 rounded-full" id="sim-cpu-bar" style="width: 12%"></div></div>
                                    </div>
                                    <div>
                                        <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">Memory Usage (Mock)</span><span class="text-slate-100 font-mono" id="sim-ram">45%</span></div>
                                        <div class="w-full bg-dark rounded-full h-2.5"><div class="bg-purple-500 h-2.5 rounded-full" id="sim-ram-bar" style="width: 45%"></div></div>
                                    </div>
                                    <div class="pt-4 flex gap-2">
                                        <button onclick="app.utils.saveResult('server', 'cpu_ram', 'pass')" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded text-sm">Mark Pass</button>
                                        <button onclick="app.utils.saveResult('server', 'cpu_ram', 'fail')" class="px-4 py-2 bg-red-600 hover:bg-red-500 text-white rounded text-sm">Mark Fail</button>
                                    </div>
                                </div>
                            </div>

                            <!-- Network Ping Tool -->
                            <div class="bg-panel border border-slate-700 rounded-xl p-6">
                                <h3 class="text-lg font-semibold mb-4 border-b border-slate-700 pb-2"><i class="fa-solid fa-network-wired mr-2 text-success"></i> Network Reachability</h3>
                                <div class="flex gap-2 mb-4">
                                    <input type="text" id="ping-target" value="https://cloudflare.com" class="flex-1 bg-dark border border-slate-700 rounded px-3 py-2 text-sm text-white" placeholder="URL to test...">
                                    <button onclick="app.hardwareLogic.testNetwork()" class="px-4 py-2 bg-primary hover:bg-blue-600 text-white rounded text-sm transition">Test</button>
                                </div>
                                <div id="network-log" class="h-32 bg-dark border border-slate-800 rounded p-3 font-mono text-xs text-green-400 overflow-y-auto mb-4">
                                    Ready to test network...
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="app.utils.saveResult('server', 'network', 'pass')" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded text-sm">Mark Pass</button>
                                    <button onclick="app.utils.saveResult('server', 'network', 'fail')" class="px-4 py-2 bg-red-600 hover:bg-red-500 text-white rounded text-sm">Mark Fail</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                    
                    document.getElementById('main-content').innerHTML = html;

                    // Start simulation loop
                    let simInterval = setInterval(() => {
                        if(app.state.currentView !== 'server') {
                            clearInterval(simInterval);
                            return;
                        }
                        const cpu = Math.floor(Math.random() * 20) + 10;
                        const ram = Math.floor(Math.random() * 5) + 40;
                        document.getElementById('sim-cpu').innerText = `${cpu}%`;
                        document.getElementById('sim-cpu-bar').style.width = `${cpu}%`;
                        document.getElementById('sim-ram').innerText = `${ram}%`;
                        document.getElementById('sim-ram-bar').style.width = `${ram}%`;
                    }, 2000);
                },

                renderActiveTest: (device, testId) => {
                    const testDef = app.tests[device].find(t => t.id === testId) || {name: 'Manual Verification', id: testId};
                    document.getElementById('page-title').innerHTML = `<button onclick="app.navigate('${device}')" class="text-slate-400 hover:text-white mr-2"><i class="fa-solid fa-arrow-left"></i></button> ${testDef.name} Test`;

                    let controlsHtml = `

            hardwareLogic: {
                startCamera: async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                        const video = document.getElementById('webcam-video');
                        const placeholder = document.getElementById('cam-placeholder');
                        if(video && placeholder) {
                            video.srcObject = stream;
                            video.classList.remove('hidden');
                            placeholder.classList.add('hidden');
                            app.state.activeStreams.push(stream);
                        }
                    } catch (err) {
                        app.utils.showToast("Camera access denied or device not found.", "error");
                    }
                },

                startMic: async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        app.state.activeStreams.push(stream);
                        
                        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        const analyser = audioContext.createAnalyser();
                        const microphone = audioContext.createMediaStreamSource(stream);
                        microphone.connect(analyser);
                        analyser.fftSize = 64;
                        const bufferLength = analyser.frequencyBinCount;
                        const dataArray = new Uint8Array(bufferLength);
                        
                        const visualizer = document.getElementById('audio-visualizer');
                        if(!visualizer) return;
                        
                        visualizer.innerHTML = '';
                        const bars = [];
                        for(let i=0; i < 16; i++) {
                            const bar = document.createElement('div');
                            bar.className = 'w-full bg-primary rounded-t opacity-80 transition-all duration-75';
                            bar.style.height = '5%';
                            visualizer.appendChild(bar);
                            bars.push(bar);
                        }

                        const updateVisuals = () => {
                            if(app.state.currentView !== 'test' || !app.state.activeStreams.includes(stream)) return;
                            analyser.getByteFrequencyData(dataArray);
                            let step = Math.floor(bufferLength / 16);
                            for(let i=0; i<16; i++) {
                                let val = dataArray[i * step] / 255;
                                bars[i].style.height = `${Math.max(5, val * 100)}%`;
                                bars[i].style.backgroundColor = val > 0.8 ? '#ef4444' : (val > 0.5 ? '#10b981' : '#3b82f6');
                            }
                            requestAnimationFrame(updateVisuals);
                        };
                        updateVisuals();

                    } catch (err) {
                        app.utils.showToast("Microphone access denied.", "error");
                    }
                },

                playTone: (freq, pan) => {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const panner = ctx.createStereoPanner();
                    const gain = ctx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    
                    if(pan === 'left') panner.pan.value = -1;
                    else if(pan === 'right') panner.pan.value = 1;
                    else panner.pan.value = 0;

                    gain.gain.setValueAtTime(0.5, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);

                    osc.connect(panner);
                    panner.connect(gain);
                    gain.connect(ctx.destination);

                    osc.start();
                    osc.stop(ctx.currentTime + 1);
                },

                fetchSysInfo: () => {
                    const el = document.getElementById('sysinfo-content');
                    if(!el) return;
                    
                    let info = `USER AGENT:\n${navigator.userAgent}\n\n`;
                    info += `LOGICAL CORES: ${navigator.hardwareConcurrency || 'Unknown'}\n`;
                    info += `DEVICE MEMORY (est): ${navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'Unknown'}\n`;
                    info += `PLATFORM: ${navigator.platform}\n`;
                    info += `LANGUAGE: ${navigator.language}\n`;
                    info += `SCREEN RES: ${window.screen.width}x${window.screen.height} (${window.screen.colorDepth}-bit)\n`;
                    info += `ONLINE STATUS: ${navigator.onLine ? 'ONLINE' : 'OFFLINE'}\n`;
                    
                    const gl = document.createElement('canvas').getContext('webgl');
                    if (gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        const vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                        const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                        info += `\nGPU VENDOR: ${vendor}\nGPU RENDERER: ${renderer}`;
                    }
                    
                    el.innerText = info;
                },

                fetchBattery: async () => {
                    const lvl = document.getElementById('bat-level');
                    const txt = document.getElementById('bat-text');
                    const stat = document.getElementById('bat-status');
                    
                    if ('getBattery' in navigator) {
                        try {
                            const battery = await navigator.getBattery();
                            const updateBat = () => {
                                const p = Math.round(battery.level * 100);
                                lvl.style.width = `${p}%`;
                                txt.innerText = `${p}%`;
                                stat.innerText = `Status: ${battery.charging ? 'Charging ⚡' : 'Discharging'}`;
                                if(p <= 20) lvl.className = "h-full bg-red-500 rounded-sm transition-all duration-1000";
                                else if (p <= 50) lvl.className = "h-full bg-yellow-500 rounded-sm transition-all duration-1000";
                                else lvl.className = "h-full bg-emerald-500 rounded-sm transition-all duration-1000";
                            };
                            updateBat();
                            battery.addEventListener('levelchange', updateBat);
                            battery.addEventListener('chargingchange', updateBat);
                        } catch(e) {
                            stat.innerText = "Battery API Error";
                        }
                    } else {
                        stat.innerText = "Battery API not supported by browser.";
                        txt.innerText = "N/A";
                    }
                },

                initKeyboard: () => {
                    const grid = document.getElementById('keyboard-grid');
                    if(!grid) return;
                    
                    // Simple visual map
                    const keys = ['Q','W','E','R','T','Y','U','I','O','P','A','S','D','F','G','H','J','K','L','Z','X','C','V','B','N','M','Space','Enter'];
                    
                    grid.innerHTML = keys.map(k => `<div id="key-${k}" class="key w-10 h-10 border border-slate-600 rounded bg-slate-800 flex items-center justify-center text-xs font-bold text-slate-400 select-none ${k==='Space'?'w-48':(k==='Enter'?'w-20':'')}">${k}</div>`).join('');

                    window.appKeyboardListener = (e) => {
                        let code = e.key.toUpperCase();
                        if(code === ' ') code = 'Space';
                        const el = document.getElementById(`key-${code}`);
                        if(el) {
                            el.classList.add('active');
                            el.classList.add('tested');
                            setTimeout(() => el.classList.remove('active'), 150);
                        }
                    };
                    window.addEventListener('keydown', window.appKeyboardListener);
                },

                resetKeyboard: () => {
                    document.querySelectorAll('.key').forEach(el => {
                        el.classList.remove('tested');
                        el.classList.remove('active');
                    });
                },

                initMouse: () => {
                    const area = document.getElementById('mouse-area');
                    const trail = document.getElementById('mouse-trail');
                    const btnL = document.getElementById('m-left');
                    const btnR = document.getElementById('m-right');
                    const btnS = document.getElementById('m-scroll');

                    if(!area) return;

                    area.onmousemove = (e) => {
                        const rect = area.getBoundingClientRect();
                        trail.style.opacity = '1';
                        trail.style.left = `${e.clientX - rect.left - 6}px`;
                        trail.style.top = `${e.clientY - rect.top - 6}px`;
                        clearTimeout(window.mouseTrailTimeout);
                        window.mouseTrailTimeout = setTimeout(() => trail.style.opacity = '0', 200);
                    };

                    area.onmousedown = (e) => {
                        if(e.button === 0) { btnL.className = "px-3 py-1 bg-emerald-600 rounded text-white font-bold"; }
                        if(e.button === 2) { btnR.className = "px-3 py-1 bg-emerald-600 rounded text-white font-bold"; }
                    };
                    
                    area.oncontextmenu = e => e.preventDefault(); // stop right click menu in area

                    area.onwheel = () => {
                        btnS.className = "px-3 py-1 bg-emerald-600 rounded text-white font-bold";
                    };
                },

                startDisplayTest: () => {
                    const overlay = document.getElementById('display-test-overlay');
                    const colors = ['#FF0000', '#00FF00', '#0000FF', '#FFFFFF', '#000000'];
                    let idx = 0;
                    
                    overlay.style.display = 'block';
                    overlay.style.backgroundColor = colors[idx];
                    
                    // Request fullscreen for accuracy
                    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});

                    overlay.onclick = () => {
                        idx++;
                        if (idx >= colors.length) {
                            overlay.style.display = 'none';
                            if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
                        } else {
                            overlay.style.backgroundColor = colors[idx];
                        }
                    };

                    window.appEscapeListener = (e) => {
                        if (e.key === 'Escape') {
                            overlay.style.display = 'none';
                            if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
                            window.removeEventListener('keydown', window.appEscapeListener);
                        }
                    };
                    window.addEventListener('keydown', window.appEscapeListener);
                },

                testNetwork: async () => {
                    const url = document.getElementById('ping-target').value;
                    const log = document.getElementById('network-log');
                    log.innerHTML += `<br>> Pinging ${url}...`;
                    log.scrollTop = log.scrollHeight;
                    
                    try {
                        const start = performance.now();
                        // use no-cors to at least check resolution/reachability without failing CORS
                        await fetch(url, { mode: 'no-cors', cache: 'no-store' }); 
                        const end = performance.now();
                        log.innerHTML += `<br>> Reply received in ${Math.round(end - start)}ms. Network Path OK.`;
                    } catch (e) {
                        log.innerHTML += `<br>> <span class="text-red-400">Request failed. Network or CORS blocked.</span>`;
                    }
                    log.scrollTop = log.scrollHeight;
                }
            }
        };

        window.onload = () => {
            app.navigate('dashboard');
            
            // Clock
            setInterval(() => {
                const el = document.getElementById('system-clock');
                if(el) el.innerText = new Date().toLocaleTimeString();
            }, 1000);

            // Cleanup listeners on navigation
            const originalNavigate = app.navigate;
            app.navigate = (view, params) => {
                if(window.appKeyboardListener) window.removeEventListener('keydown', window.appKeyboardListener);
                originalNavigate(view, params);
            };
        };

    </script>
</body>
</html>
