<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#09090b',
                        darker: '#000000',
                        panel: '#18181b',
                        primary: '#06b6d4', 
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                    },
                    fontFamily: {
                        mono: ['Consolas', 'Monaco', 'Courier New', 'monospace'],
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #000000; color: #f8fafc; overflow: hidden; user-select: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Keyboard Styles */
        .kbd-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 4px; }
        .key { transition: all 0.1s; box-shadow: 0 3px 0 #27272a; border: 1px solid #3f3f46; border-radius: 4px; background-color: #18181b; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; color: #a1a1aa; cursor: pointer; }
        .key.active { background-color: #06b6d4; color: white; transform: translateY(3px); box-shadow: 0 0 0 #27272a; border-color: #06b6d4; }
        .key.tested { background-color: #10b981; color: white; box-shadow: 0 3px 0 #047857; border-color: #059669; }
        .key.tested.active { transform: translateY(3px); box-shadow: 0 0 0 #047857; }
        
        .k-std { width: 42px; height: 42px; }
        .k-sm { width: 38px; height: 32px; font-size: 0.65rem; }
        .k-w1 { width: 65px; height: 42px; } /* Tab */
        .k-w2 { width: 80px; height: 42px; } /* Caps */
        .k-w3 { width: 100px; height: 42px; } /* Shift L */
        .k-w4 { width: 110px; height: 42px; } /* Enter / Shift R */
        .k-space { width: 260px; height: 42px; }

        /* Battery Grid Table (BatteryInfoView style) */
        .data-grid { width: 100%; border-collapse: collapse; font-family: 'Consolas', monospace; font-size: 0.85rem; }
        .data-grid th { text-align: left; padding: 8px 12px; background-color: #27272a; border: 1px solid #3f3f46; color: #d4d4d8; font-weight: normal; }
        .data-grid td { padding: 8px 12px; border: 1px solid #3f3f46; color: #fff; }
        .data-grid tr:nth-child(even) { background-color: #18181b; }
        .data-grid tr:nth-child(odd) { background-color: #09090b; }
        .data-grid tr:hover { background-color: #3f3f46; }

        /* Port Indicators */
        .port-light { transition: all 0.3s ease; }
        .port-light.on { background-color: rgba(16, 185, 129, 0.15); border-color: #10b981; color: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4) inset; }

        /* Touchpad Canvas */
        #touch-canvas { touch-action: none; background-color: #09090b; border: 2px dashed #3f3f46; border-radius: 0.5rem; width: 100%; height: 400px; cursor: crosshair; }
        
        /* Mic Oscilloscope */
        #mic-canvas { width: 100%; height: 250px; background-color: #000; border: 1px solid #27272a; border-radius: 8px; }
    </style>
</head>
<body class="h-screen w-screen flex">

    <nav id="sidebar" class="w-64 bg-dark border-r border-zinc-800 flex flex-col h-full z-10 shadow-xl">
        <div class="p-6 border-b border-zinc-800 flex items-center gap-3">
            <i class="fa-solid fa-microchip text-primary text-3xl"></i>
            <div>
                <h1 class="text-xl font-bold tracking-wider leading-tight text-white">DEVICE</h1>
                <h1 class="text-sm font-semibold tracking-widest text-primary">CHECKER</h1>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1 px-3" id="nav-menu">
                <li><button onclick="app.navigate('battery')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-white transition-all font-medium tracking-wide" data-nav="battery"><i class="fa-solid fa-car-battery w-5 text-center"></i> Battery</button></li>
                <li><button onclick="app.navigate('keyboard')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-white transition-all font-medium tracking-wide" data-nav="keyboard"><i class="fa-solid fa-keyboard w-5 text-center"></i> Keyboard</button></li>
                <li><button onclick="app.navigate('touchpad')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-white transition-all font-medium tracking-wide" data-nav="touchpad"><i class="fa-solid fa-hand-pointer w-5 text-center"></i> Touch Pad</button></li>
                <li><button onclick="app.navigate('mic')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-white transition-all font-medium tracking-wide" data-nav="mic"><i class="fa-solid fa-microphone-lines w-5 text-center"></i> Mic Test</button></li>
                <li><button onclick="app.navigate('voice')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-white transition-all font-medium tracking-wide" data-nav="voice"><i class="fa-solid fa-voicemail w-5 text-center"></i> Voice Record</button></li>
                <li><button onclick="app.navigate('camera')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-white transition-all font-medium tracking-wide" data-nav="camera"><i class="fa-solid fa-camera w-5 text-center"></i> Camera</button></li>
                <li><button onclick="app.navigate('ports')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-white transition-all font-medium tracking-wide" data-nav="ports"><i class="fa-solid fa-hubspot w-5 text-center"></i> Port Checker</button></li>
            </ul>
        </div>
        <div class="p-4 bg-zinc-900 border-t border-zinc-800 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-success animate-pulse"></div>
                <span class="text-xs font-bold text-zinc-400 tracking-wider">ENGINEER MODE</span>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex flex-col h-full bg-darker relative overflow-hidden">
        <header id="topbar" class="h-16 bg-dark border-b border-zinc-800 flex items-center justify-between px-8 z-10 shadow-md">
            <h2 id="page-title" class="text-lg font-bold text-zinc-100 uppercase tracking-wider flex items-center gap-3">
                Select a Test
            </h2>
            <div class="flex items-center gap-4">
                <span id="system-clock" class="text-sm font-mono font-bold text-zinc-400">00:00:00</span>
            </div>
        </header>

        <div id="main-content" class="flex-1 overflow-y-auto p-6 scrollbar-hide relative bg-zinc-950">
            <!-- Test Interfaces Injected Here -->
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script>
        const app = {
            state: {
                currentTest: null,
                activeStreams: [], 
                audioRecorder: null,
                audioChunks: [],
                animationFrameId: null,
                cachedDevices: { audio: 0, video: 0 } // For port checking diffs
            },

            utils: {
                showToast: (title, msg, type = 'info') => {
                    const container = document.getElementById('toast-container');
                    const toast = document.createElement('div');
                    
                    let bg = 'bg-zinc-800', border = 'border-primary', icon = 'fa-info-circle', text = 'text-primary';
                    if(type === 'success') { bg = 'bg-emerald-950'; border = 'border-emerald-500'; icon = 'fa-check-circle'; text = 'text-emerald-400'; }
                    if(type === 'error') { bg = 'bg-red-950'; border = 'border-red-500'; icon = 'fa-triangle-exclamation'; text = 'text-red-400'; }
                    
                    toast.className = `${bg} ${border} border px-6 py-4 rounded-lg shadow-2xl fade-in flex items-center gap-4 pointer-events-auto min-w-[300px]`;
                    toast.innerHTML = `
                        <i class="fa-solid ${icon} ${text} text-3xl"></i> 
                        <div class="flex flex-col">
                            <span class="font-bold text-white tracking-wide">${title}</span>
                            <span class="text-sm text-zinc-400 font-mono mt-1">${msg}</span>
                        </div>
                    `;
                    container.appendChild(toast);
                    
                    app.hardware.playTone(type === 'success' ? 880 : 440, 'both', 'sine', 0.1);
                    if(type === 'success') setTimeout(() => app.hardware.playTone(1100, 'both', 'sine', 0.15), 150);

                    setTimeout(() => {
                        toast.style.opacity = '0';
                        toast.style.transition = 'opacity 0.3s';
                        setTimeout(() => toast.remove(), 300);
                    }, 5000);
                },
                
                stopHardware: () => {
                    // Stop Camera/Mic Streams
                    app.state.activeStreams.forEach(stream => stream.getTracks().forEach(track => track.stop()));
                    app.state.activeStreams = [];
                    // Stop Recorders
                    if(app.state.audioRecorder && app.state.audioRecorder.state !== 'inactive') app.state.audioRecorder.stop();
                    // Stop Animation Loops (Oscilloscope)
                    if(app.state.animationFrameId) cancelAnimationFrame(app.state.animationFrameId);
                    
                    // Clean global listeners
                    if(window.kbdDownListener) { window.removeEventListener('keydown', window.kbdDownListener, true); window.kbdDownListener = null; }
                    if(window.kbdUpListener) { window.removeEventListener('keyup', window.kbdUpListener, true); window.kbdUpListener = null; }
                    if(window.usbListener) { navigator.usb?.removeEventListener('connect', window.usbListener); window.usbListener = null; }
                    if(window.mediaListener) { navigator.mediaDevices?.removeEventListener('devicechange', window.mediaListener); window.mediaListener = null; }
                    if(window.screenListener) { window.removeEventListener('resize', window.screenListener); window.screenListener = null; }
                }
            },

            navigate: (testId) => {
                app.utils.stopHardware();
                app.state.currentTest = testId;
                
                // Update Sidebar Styles
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('bg-primary/10', 'text-white', 'border-l-4', 'border-primary');
                    btn.classList.add('text-zinc-400');
                    if(btn.dataset.nav === testId) {
                        btn.classList.remove('text-zinc-400');
                        btn.classList.add('bg-primary/10', 'text-white', 'border-l-4', 'border-primary');
                    }
                });

                // Update Topbar
                const testTitles = {
                    'battery': '<i class="fa-solid fa-car-battery text-primary"></i> Battery Health Info',
                    'keyboard': '<i class="fa-solid fa-keyboard text-primary"></i> Keyboard Intercept',
                    'touchpad': '<i class="fa-solid fa-hand-pointer text-primary"></i> Touch Pad & Mouse',
                    'mic': '<i class="fa-solid fa-microphone-lines text-primary"></i> Online Mic Test',
                    'voice': '<i class="fa-solid fa-voicemail text-primary"></i> Voice Recorder',
                    'camera': '<i class="fa-solid fa-camera text-primary"></i> Camera Feed',
                    'ports': '<i class="fa-solid fa-hubspot text-primary"></i> Port Checker (Live)'
                };
                document.getElementById('page-title').innerHTML = testTitles[testId] || 'Device Checker';

                // Render Content
                const contentDiv = document.getElementById('main-content');
                contentDiv.innerHTML = `<div class="fade-in max-w-5xl mx-auto h-full pb-10">${app.templates[testId]()}</div>`;

                // Initialize Test Logic
                setTimeout(() => {
                    if (app.hardware[testId]) app.hardware[testId]();
                }, 50);
            },

            templates: {
                battery: () => `
                    <div class="bg-panel border border-zinc-800 rounded-sm shadow-2xl p-1 overflow-hidden">
                        <div class="bg-zinc-200 text-black px-3 py-1 flex items-center justify-between text-xs border-b border-zinc-400">
                            <div class="font-sans flex items-center gap-2"><i class="fa-solid fa-battery-half text-zinc-600"></i> BatteryInfoView</div>
                            <div class="flex gap-1"><div class="w-3 h-3 bg-zinc-400 border border-zinc-500"></div><div class="w-3 h-3 bg-zinc-400 border border-zinc-500"></div><div class="w-3 h-3 bg-red-500 border border-red-700 text-white flex items-center justify-center font-bold" style="font-size: 8px;">X</div></div>
                        </div>
                        <div class="bg-zinc-100 border-b border-zinc-300 p-1 flex gap-2">
                            <button class="px-2 py-1 hover:bg-zinc-300 border border-transparent hover:border-zinc-400 text-black text-xs cursor-pointer"><i class="fa-solid fa-rotate-right text-blue-600"></i> Refresh</button>
                            <button class="px-2 py-1 hover:bg-zinc-300 border border-transparent hover:border-zinc-400 text-black text-xs cursor-pointer"><i class="fa-solid fa-save text-blue-600"></i> Save</button>
                        </div>
                        <div class="overflow-x-auto bg-dark pb-2">
                            <table class="data-grid" id="battery-table">
                                <thead><tr><th>Property</th><th>Value</th></tr></thead>
                                <tbody>
                                    <tr><td>Description</td><td>Local System Battery</td></tr>
                                    <tr><td>Power State</td><td id="b-state">Scanning...</td></tr>
                                    <tr><td>Current Capacity (in %)</td><td id="b-level">Scanning...</td></tr>
                                    <tr><td>Current Capacity Value</td><td class="text-zinc-500">OS Restricted</td></tr>
                                    <tr><td>Full Charged Capacity</td><td class="text-zinc-500">OS Restricted</td></tr>
                                    <tr><td>Designed Capacity</td><td class="text-zinc-500">OS Restricted</td></tr>
                                    <tr><td>Battery Health</td><td class="text-zinc-500" id="b-health">Calculating Estimate...</td></tr>
                                    <tr><td>Voltage</td><td class="text-zinc-500">OS Restricted</td></tr>
                                    <tr><td>Charge/Discharge Rate</td><td class="text-zinc-500">OS Restricted</td></tr>
                                    <tr><td>Time to Full Charge</td><td id="b-full">N/A</td></tr>
                                    <tr><td>Time to Empty</td><td id="b-empty">N/A</td></tr>
                                    <tr><td>Chemistry</td><td class="text-zinc-500">Lithium-Ion (Assumed)</td></tr>
                                    <tr><td>Cycle Count</td><td class="text-zinc-500 font-bold bg-zinc-900/50">Blocked by Browser Sandbox Security</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="p-3 bg-zinc-900 border-t border-zinc-800 text-xs text-zinc-500 font-mono flex gap-2">
                            <i class="fa-solid fa-circle-info text-primary mt-0.5"></i>
                            <p>Deep hardware metrics (Voltage, Cycle Count, exact mWh Capacities) cannot be accessed via web browsers to prevent device fingerprinting. Values marked "OS Restricted" require native application privileges.</p>
                        </div>
                    </div>`,

                keyboard: () => `
                    <div class="bg-panel border border-zinc-800 rounded-xl p-6 text-center shadow-2xl mt-4">
                        <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-3 mb-6 inline-block">
                            <p class="text-zinc-300 text-sm flex items-center gap-3">
                                <i class="fa-solid fa-shield-halved text-primary"></i>
                                Hardware Intercept Mode Active. Default browser shortcuts (F5, Space, Tab) are blocked for testing.
                            </p>
                        </div>
                        <div id="keyboard-container" class="bg-black p-6 rounded-xl border border-zinc-800 inline-block overflow-x-auto max-w-full shadow-inner">
                            <!-- Generated by JS -->
                        </div>
                        <div class="mt-8">
                            <button onclick="app.hardware.keyboard()" class="px-6 py-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 hover:border-zinc-500 text-white font-bold text-sm rounded-lg transition-all"><i class="fa-solid fa-rotate-right mr-2 text-primary"></i> Reset Grid</button>
                        </div>
                    </div>`,

                touchpad: () => `
                    <div class="bg-panel border border-zinc-800 rounded-xl p-8 text-center shadow-2xl mt-4">
                        <div class="flex justify-between items-end mb-6">
                            <div class="text-left">
                                <h3 class="text-xl text-white font-bold mb-1">Trackpad & Mouse Diagnostics</h3>
                                <p class="text-zinc-500 text-sm">Draw in the box to test multi-touch/tracking. Use physical buttons to test clicks.</p>
                            </div>
                            <button onclick="app.hardware.clearTouchpad()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 text-white font-bold text-sm rounded border border-zinc-700 transition-colors"><i class="fa-solid fa-eraser mr-2"></i> Clear Surface</button>
                        </div>
                        
                        <canvas id="touch-canvas" class="mb-6 shadow-inner"></canvas>
                        
                        <div class="flex justify-center gap-4 font-mono text-sm font-bold w-full max-w-2xl mx-auto">
                            <div id="m-left" class="flex-1 py-4 bg-zinc-900 rounded border border-zinc-800 text-zinc-600 transition-all">LEFT CLICK</div>
                            <div id="m-scroll" class="flex-1 py-4 bg-zinc-900 rounded border border-zinc-800 text-zinc-600 transition-all">SCROLL WHEEL</div>
                            <div id="m-right" class="flex-1 py-4 bg-zinc-900 rounded border border-zinc-800 text-zinc-600 transition-all">RIGHT CLICK</div>
                        </div>
                    </div>`,

                mic: () => `
                    <div class="bg-panel border border-zinc-800 rounded-xl p-8 flex flex-col items-center shadow-2xl mt-4">
                        <i class="fa-solid fa-microphone-lines text-5xl text-zinc-600 mb-6 drop-shadow-md" id="mic-icon"></i>
                        <h3 class="text-2xl font-bold text-white mb-2 tracking-wide">Microphone Oscilloscope</h3>
                        <p class="text-zinc-500 text-sm mb-8">Test your microphone via real-time waveform analysis.</p>
                        
                        <div class="w-full max-w-3xl mb-8 relative group">
                            <canvas id="mic-canvas"></canvas>
                            <div id="mic-overlay" class="absolute inset-0 bg-black/80 flex items-center justify-center rounded-8px border border-zinc-800 z-10 backdrop-blur-sm">
                                <button onclick="app.hardware.startMic()" class="px-8 py-3 bg-primary hover:bg-cyan-400 text-darker rounded font-bold uppercase tracking-widest transition-all shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                                    <i class="fa-solid fa-play mr-2"></i> Allow Access & Start
                                </button>
                            </div>
                        </div>
                    </div>`,

                voice: () => `
                    <div class="bg-panel border border-zinc-800 rounded-xl p-8 flex flex-col items-center shadow-2xl mt-4">
                        <i class="fa-solid fa-voicemail text-6xl text-primary mb-6 drop-shadow-[0_0_15px_rgba(6,182,212,0.3)]"></i>
                        <h3 class="text-2xl font-bold text-white mb-2 tracking-wide">Voice Recorder Quality Test</h3>
                        <p class="text-zinc-500 font-medium text-sm mb-8 text-center max-w-lg">Record a short phrase (e.g. "Testing 1, 2, 3") and play it back to verify the internal microphone is not muffled or distorted.</p>
                        
                        <div class="flex gap-4 mb-8">
                            <button id="btn-record" onclick="app.hardware.startVoice()" class="px-8 py-4 bg-red-600 hover:bg-red-500 text-white rounded font-bold uppercase tracking-widest transition-all shadow-lg w-48"><i class="fa-solid fa-circle text-xs align-middle mr-2"></i> Record</button>
                            <button id="btn-stop" onclick="app.hardware.stopVoice()" class="px-8 py-4 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-zinc-400 rounded font-bold uppercase tracking-widest transition-all hidden w-48"><i class="fa-solid fa-stop mr-2"></i> Stop</button>
                        </div>
                        
                        <div id="playback-container" class="w-full max-w-lg bg-black border border-zinc-800 p-6 rounded-xl hidden flex-col items-center shadow-inner">
                            <span class="text-success font-bold font-mono text-sm mb-4"><i class="fa-solid fa-check mr-2"></i> Audio Captured</span>
                            <audio id="audio-playback" controls class="w-full"></audio>
                        </div>
                    </div>`,

                camera: () => `
                    <div class="bg-panel border border-zinc-800 rounded-xl p-8 flex flex-col items-center shadow-2xl mt-4">
                        <div class="w-full max-w-3xl aspect-video bg-black rounded-xl overflow-hidden border border-zinc-700 relative flex items-center justify-center mb-6 shadow-inner group">
                            <video id="webcam-video" autoplay playsinline class="w-full h-full object-cover hidden transform scale-x-[-1]"></video>
                            <div id="cam-overlay" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-10">
                                <i class="fa-solid fa-camera text-5xl text-zinc-600 mb-6"></i>
                                <button onclick="app.hardware.startCamera()" class="px-8 py-3 bg-primary hover:bg-cyan-400 text-darker rounded font-bold uppercase tracking-widest transition-all shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                                    <i class="fa-solid fa-play mr-2"></i> Initialize Sensor
                                </button>
                            </div>
                        </div>
                        <div class="w-full max-w-3xl flex justify-between px-2">
                            <span class="text-xs font-mono text-zinc-500" id="cam-res">Resolution: Standby</span>
                            <span class="text-xs font-mono text-zinc-500">Video mirrored for natural testing</span>
                        </div>
                    </div>`,

                ports: () => `
                    <div class="bg-panel border border-zinc-800 rounded-xl p-8 shadow-2xl mt-4">
                        <div class="text-center mb-10">
                            <i class="fa-brands fa-hubspot text-6xl text-primary mb-4 animate-pulse"></i>
                            <h3 class="text-2xl font-bold text-white mb-2">Live Hardware Connection Listener</h3>
                            <p class="text-zinc-400 text-sm max-w-xl mx-auto">Actively scanning the motherboard for hardware interrupts. Plug in a USB drive, Type-C cable, Audio headset, or HDMI monitor.</p>
                        </div>
                        
                        <div id="port-grid" class="grid grid-cols-1 sm:grid-cols-3 gap-6 max-w-4xl mx-auto">
                            <div id="port-usb" class="port-light bg-black border border-zinc-700 rounded-xl p-8 text-center text-zinc-600 flex flex-col items-center justify-center h-40 relative overflow-hidden">
                                <i class="fa-brands fa-usb text-5xl mb-3"></i>
                                <p class="font-bold font-mono text-sm text-zinc-400">USB / TYPE-C</p>
                                <div class="absolute bottom-0 w-full h-1 bg-zinc-800" id="bar-usb"></div>
                            </div>
                            <div id="port-audio" class="port-light bg-black border border-zinc-700 rounded-xl p-8 text-center text-zinc-600 flex flex-col items-center justify-center h-40 relative overflow-hidden">
                                <i class="fa-solid fa-headset text-5xl mb-3"></i>
                                <p class="font-bold font-mono text-sm text-zinc-400">AUDIO JACK</p>
                                <div class="absolute bottom-0 w-full h-1 bg-zinc-800" id="bar-audio"></div>
                            </div>
                            <div id="port-hdmi" class="port-light bg-black border border-zinc-700 rounded-xl p-8 text-center text-zinc-600 flex flex-col items-center justify-center h-40 relative overflow-hidden">
                                <i class="fa-solid fa-display text-5xl mb-3"></i>
                                <p class="font-bold font-mono text-sm text-zinc-400">HDMI / DISPLAY</p>
                                <div class="absolute bottom-0 w-full h-1 bg-zinc-800" id="bar-hdmi"></div>
                            </div>
                        </div>
                        
                        <div class="mt-10 bg-zinc-900/50 border border-zinc-800 p-4 rounded text-center max-w-3xl mx-auto">
                            <p class="text-xs text-zinc-500 font-mono"><i class="fa-solid fa-triangle-exclamation text-warning mr-2"></i> Power-only chargers do not trigger data interrupts. You must use data-enabled peripherals.</p>
                        </div>
                    </div>`
            },

            hardware: {
                battery: async () => {
                    if ('getBattery' in navigator) {
                        try {
                            const b = await navigator.getBattery();
                            const update = () => {
                                document.getElementById('b-level').innerHTML = `${Math.round(b.level * 100)}%`;
                                document.getElementById('b-state').innerHTML = b.charging ? '<span class="text-success">Charging (AC Power)</span>' : '<span class="text-warning">Discharging (Battery)</span>';
                                
                                const formatTime = (sec) => {
                                    if(sec === Infinity || sec === 0) return 'Unknown / Calculating...';
                                    const hrs = Math.floor(sec / 3600);
                                    const mins = Math.floor((sec % 3600) / 60);
                                    return `${hrs}h ${mins}m`;
                                };
                                
                                document.getElementById('b-empty').innerText = b.charging ? 'N/A' : formatTime(b.dischargingTime);
                                document.getElementById('b-full').innerText = b.charging ? formatTime(b.chargingTime) : 'N/A';
                                
                                // Fake health estimate purely for the UI based on general rules, as real health is OS restricted
                                let health = "Good";
                                if(b.level === 1 && b.charging) health = "Excellent";
                                else if (!b.charging && b.dischargingTime !== Infinity && b.dischargingTime < 3600) health = "Degraded (Fast Discharge)";
                                document.getElementById('b-health').innerHTML = `<span class="text-white">${health} (Estimated)</span>`;
                            };
                            update();
                            b.addEventListener('levelchange', update);
                            b.addEventListener('chargingchange', update);
                            b.addEventListener('dischargingtimechange', update);
                            b.addEventListener('chargingtimechange', update);
                        } catch(e) {
                            document.getElementById('b-state').innerText = "Access Denied by Browser";
                        }
                    } else {
                        document.getElementById('b-state').innerHTML = '<span class="text-danger">API Not Supported in this Browser</span>';
                    }
                },

                keyboard: () => {
                    const container = document.getElementById('keyboard-container');
                    if(!container) return;

                    const rows = [
                        [ {c:'Esc',code:'Escape',w:'k-sm'},{c:'F1',w:'k-sm'},{c:'F2',w:'k-sm'},{c:'F3',w:'k-sm'},{c:'F4',w:'k-sm'},{c:'F5',w:'k-sm'},{c:'F6',w:'k-sm'},{c:'F7',w:'k-sm'},{c:'F8',w:'k-sm'},{c:'F9',w:'k-sm'},{c:'F10',w:'k-sm'},{c:'F11',w:'k-sm'},{c:'F12',w:'k-sm'},{c:'Del',code:'Delete',w:'k-sm'} ],
                        [ {c:'`',code:'Backquote',w:'k-std'},{c:'1',code:'Digit1',w:'k-std'},{c:'2',code:'Digit2',w:'k-std'},{c:'3',code:'Digit3',w:'k-std'},{c:'4',code:'Digit4',w:'k-std'},{c:'5',code:'Digit5',w:'k-std'},{c:'6',code:'Digit6',w:'k-std'},{c:'7',code:'Digit7',w:'k-std'},{c:'8',code:'Digit8',w:'k-std'},{c:'9',code:'Digit9',w:'k-std'},{c:'0',code:'Digit0',w:'k-std'},{c:'-',code:'Minus',w:'k-std'},{c:'=',code:'Equal',w:'k-std'},{c:'Backspace',w:'k-w4',code:'Backspace'} ],
                        [ {c:'Tab',w:'k-w1',code:'Tab'},{c:'Q',code:'KeyQ',w:'k-std'},{c:'W',code:'KeyW',w:'k-std'},{c:'E',code:'KeyE',w:'k-std'},{c:'R',code:'KeyR',w:'k-std'},{c:'T',code:'KeyT',w:'k-std'},{c:'Y',code:'KeyY',w:'k-std'},{c:'U',code:'KeyU',w:'k-std'},{c:'I',code:'KeyI',w:'k-std'},{c:'O',code:'KeyO',w:'k-std'},{c:'P',code:'KeyP',w:'k-std'},{c:'[',code:'BracketLeft',w:'k-std'},{c:']',code:'BracketRight',w:'k-std'},{c:'\\',code:'Backslash',w:'k-w1'} ],
                        [ {c:'Caps',w:'k-w2',code:'CapsLock'},{c:'A',code:'KeyA',w:'k-std'},{c:'S',code:'KeyS',w:'k-std'},{c:'D',code:'KeyD',w:'k-std'},{c:'F',code:'KeyF',w:'k-std'},{c:'G',code:'KeyG',w:'k-std'},{c:'H',code:'KeyH',w:'k-std'},{c:'J',code:'KeyJ',w:'k-std'},{c:'K',code:'KeyK',w:'k-std'},{c:'L',code:'KeyL',w:'k-std'},{c:';',code:'Semicolon',w:'k-std'},{c:'\'',code:'Quote',w:'k-std'},{c:'Enter',w:'k-w4',code:'Enter'} ],
                        [ {c:'Shift L',w:'k-w3',code:'ShiftLeft'},{c:'Z',code:'KeyZ',w:'k-std'},{c:'X',code:'KeyX',w:'k-std'},{c:'C',code:'KeyC',w:'k-std'},{c:'V',code:'KeyV',w:'k-std'},{c:'B',code:'KeyB',w:'k-std'},{c:'N',code:'KeyN',w:'k-std'},{c:'M',code:'KeyM',w:'k-std'},{c:',',code:'Comma',w:'k-std'},{c:'.',code:'Period',w:'k-std'},{c:'/',code:'Slash',w:'k-std'},{c:'Shift R',w:'k-w4',code:'ShiftRight'} ],
                        [ {c:'Ctrl L',w:'k-w1',code:'ControlLeft'},{c:'Win',w:'k-w1',code:'MetaLeft'},{c:'Alt L',w:'k-w1',code:'AltLeft'},{c:'Space',w:'k-space',code:'Space'},{c:'Alt R',w:'k-w1',code:'AltRight'},{c:'Ctrl R',w:'k-w1',code:'ControlRight'},{c:'←',code:'ArrowLeft',w:'k-std'},{c:'↑',code:'ArrowUp',w:'k-std'},{c:'↓',code:'ArrowDown',w:'k-std'},{c:'→',code:'ArrowRight',w:'k-std'} ]
                    ];

                    container.innerHTML = rows.map(r => `<div class="kbd-row">${r.map(k => `<div id="key-${k.code}" class="key ${k.w}">${k.c}</div>`).join('')}</div>`).join('');

                    if(window.kbdDownListener) { window.removeEventListener('keydown', window.kbdDownListener, true); window.removeEventListener('keyup', window.kbdUpListener, true); }

                    window.kbdDownListener = (e) => {
                        e.preventDefault(); e.stopPropagation();
                        const el = document.getElementById(`key-${e.code}`);
                        if(el) {
                            el.classList.add('active', 'tested');
                            app.hardware.playTone(800, 'both', 'sine', 0.02);
                        }
                        return false;
                    };
                    window.kbdUpListener = (e) => {
                        e.preventDefault(); e.stopPropagation();
                        const el = document.getElementById(`key-${e.code}`);
                        if(el) el.classList.remove('active');
                        return false;
                    };

                    window.addEventListener('keydown', window.kbdDownListener, true);
                    window.addEventListener('keyup', window.kbdUpListener, true);
                },

                touchpad: () => {
                    const canvas = document.getElementById('touch-canvas');
                    if(!canvas) return;
                    const ctx = canvas.getContext('2d');
                    
                    const resize = () => {
                        canvas.width = canvas.parentElement.clientWidth - 64; // match padding
                        canvas.height = 400;
                        app.hardware.clearTouchpad();
                    };
                    resize();
                    window.addEventListener('resize', resize);

                    let isDrawing = false;
                    const draw = (e) => {
                        if(!isDrawing) return;
                        e.preventDefault();
                        ctx.lineWidth = 4;
                        ctx.lineCap = 'round';
                        ctx.strokeStyle = '#06b6d4'; 
                        
                        const rect = canvas.getBoundingClientRect();
                        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
                        let clientY = e.clientY || (e.touches && e.touches[0].clientY);

                        ctx.lineTo(clientX - rect.left, clientY - rect.top);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(clientX - rect.left, clientY - rect.top);
                    };

                    canvas.addEventListener('mousedown', (e) => { isDrawing = true; draw(e); });
                    canvas.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); });
                    canvas.addEventListener('mousemove', draw);
                    canvas.addEventListener('touchstart', (e) => { isDrawing = true; draw(e); });
                    canvas.addEventListener('touchend', () => { isDrawing = false; ctx.beginPath(); });
                    canvas.addEventListener('touchmove', draw);

                    // Button Tracker
                    const flashBtn = (id) => {
                        const btn = document.getElementById(id);
                        if(!btn) return;
                        btn.classList.replace('bg-zinc-900', 'bg-primary');
                        btn.classList.replace('text-zinc-600', 'text-darker');
                        setTimeout(() => {
                            btn.classList.replace('bg-primary', 'bg-zinc-900');
                            btn.classList.replace('text-darker', 'text-zinc-600');
                        }, 200);
                        app.hardware.playTone(1000, 'both', 'square', 0.05);
                    };

                    canvas.onmousedown = (e) => {
                        if(e.button === 0) flashBtn('m-left');
                        if(e.button === 1) flashBtn('m-scroll');
                        if(e.button === 2) flashBtn('m-right');
                    };
                    canvas.oncontextmenu = e => e.preventDefault();
                    canvas.onwheel = (e) => { e.preventDefault(); flashBtn('m-scroll'); };
                    
                    app.hardware.clearTouchpad = () => {
                        ctx.fillStyle = "#09090b";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    };
                },

                startMic: async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        app.state.activeStreams.push(stream);
                        document.getElementById('mic-overlay').classList.add('hidden');
                        document.getElementById('mic-icon').classList.replace('text-zinc-600', 'text-success');
                        
                        const canvas = document.getElementById('mic-canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = canvas.clientWidth;
                        canvas.height = canvas.clientHeight;

                        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        const analyser = audioContext.createAnalyser();
                        const source = audioContext.createMediaStreamSource(stream);
                        source.connect(analyser);
                        analyser.fftSize = 2048;
                        const bufferLength = analyser.frequencyBinCount;
                        const dataArray = new Uint8Array(bufferLength);

                        const draw = () => {
                            if(app.state.currentTest !== 'mic') return;
                            app.state.animationFrameId = requestAnimationFrame(draw);
                            analyser.getByteTimeDomainData(dataArray);

                            ctx.fillStyle = '#000000';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                            ctx.lineWidth = 2;
                            ctx.strokeStyle = '#10b981'; // Success green line
                            ctx.beginPath();

                            const sliceWidth = canvas.width * 1.0 / bufferLength;
                            let x = 0;

                            for (let i = 0; i < bufferLength; i++) {
                                const v = dataArray[i] / 128.0;
                                const y = v * canvas.height / 2;
                                if (i === 0) ctx.moveTo(x, y);
                                else ctx.lineTo(x, y);
                                x += sliceWidth;
                            }
                            ctx.lineTo(canvas.width, canvas.height / 2);
                            ctx.stroke();
                        };
                        draw();
                    } catch (err) {
                        app.utils.showToast("Microphone Denied", "Check browser permissions.", "error");
                    }
                },

                startVoice: async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        app.state.activeStreams.push(stream);
                        app.state.audioChunks = [];
                        app.state.audioRecorder = new MediaRecorder(stream);
                        
                        app.state.audioRecorder.ondataavailable = e => {
                            if (e.data.size > 0) app.state.audioChunks.push(e.data);
                        };

                        app.state.audioRecorder.onstop = () => {
                            const audioBlob = new Blob(app.state.audioChunks, { type: 'audio/webm' });
                            const audioUrl = URL.createObjectURL(audioBlob);
                            const audioEl = document.getElementById('audio-playback');
                            audioEl.src = audioUrl;
                            document.getElementById('playback-container').classList.replace('hidden', 'flex');
                        };

                        app.state.audioRecorder.start();
                        document.getElementById('btn-record').classList.add('animate-pulse', 'shadow-[0_0_20px_rgba(220,38,38,0.8)]');
                        document.getElementById('btn-record').innerHTML = '<i class="fa-solid fa-circle text-xs align-middle mr-2 animate-ping"></i> Recording...';
                        document.getElementById('btn-stop').classList.remove('hidden');
                    } catch (err) {
                        app.utils.showToast("Microphone Denied", "Cannot record without mic access.", "error");
                    }
                },

                stopVoice: () => {
                    if(app.state.audioRecorder && app.state.audioRecorder.state !== 'inactive') {
                        app.state.audioRecorder.stop();
                        app.utils.stopHardware();
                        const btnRecord = document.getElementById('btn-record');
                        btnRecord.classList.remove('animate-pulse', 'shadow-[0_0_20px_rgba(220,38,38,0.8)]');
                        btnRecord.innerHTML = '<i class="fa-solid fa-circle text-xs align-middle mr-2"></i> Record Again';
                        document.getElementById('btn-stop').classList.add('hidden');
                    }
                },

                startCamera: async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: {ideal: 1920}, height: {ideal: 1080} } });
                        const video = document.getElementById('webcam-video');
                        video.srcObject = stream;
                        video.classList.remove('hidden');
                        document.getElementById('cam-overlay').classList.add('hidden');
                        app.state.activeStreams.push(stream);
                        
                        // Detect resolution once playing
                        video.onloadedmetadata = () => {
                            document.getElementById('cam-res').innerText = `Resolution: ${video.videoWidth} x ${video.videoHeight}px`;
                        };
                    } catch (err) {
                        app.utils.showToast("Camera Denied", "Check privacy settings or hardware switch.", "error");
                    }
                },

                ports: async () => {
                    const activateLight = (id, colorCls, bgCls) => {
                        const port = document.getElementById(id);
                        const bar = document.getElementById(id.replace('port-', 'bar-'));
                        if(!port) return;
                        
                        port.classList.add('on');
                        port.classList.replace('text-zinc-600', colorCls);
                        bar.classList.replace('bg-zinc-800', bgCls);
                        
                        setTimeout(() => {
                            port.classList.remove('on');
                            port.classList.replace(colorCls, 'text-zinc-600');
                            bar.classList.replace(bgCls, 'bg-zinc-800');
                        }, 2500);
                    };

                    // 1. Listen for USB / Type-C (Requires HTTPS / Localhost)
                    if(navigator.usb) {
                        window.usbListener = (e) => {
                            if(app.state.currentTest !== 'ports') return;
                            app.utils.showToast("USB / Type-C Detected", `Device string: ${e.device?.productName || 'Generic USB Device'}`, "success");
                            activateLight('port-usb', 'text-primary', 'bg-primary');
                        };
                        navigator.usb.addEventListener('connect', window.usbListener);
                    } else {
                        document.getElementById('port-usb').innerHTML += `<p class="text-[10px] text-danger absolute top-2 right-2 border border-danger p-1 rounded">API Unsupported</p>`;
                    }

                    // 2. Listen for Audio Jack (Headsets / Mics)
                    const countMediaDevices = async () => {
                        try {
                            const devs = await navigator.mediaDevices.enumerateDevices();
                            return {
                                audio: devs.filter(d => d.kind.includes('audio')).length,
                                video: devs.filter(d => d.kind.includes('video')).length
                            };
                        } catch(e) { return null; }
                    };
                    
                    app.state.cachedDevices = await countMediaDevices();

                    window.mediaListener = async () => {
                        if(app.state.currentTest !== 'ports') return;
                        const newCounts = await countMediaDevices();
                        if(!newCounts || !app.state.cachedDevices) return;
                        
                        // If count increased, something was plugged in
                        if(newCounts.audio > app.state.cachedDevices.audio) {
                            app.utils.showToast("Audio Jack Detected", "Headphone or Microphone connected.", "success");
                            activateLight('port-audio', 'text-fuchsia-400', 'bg-fuchsia-400');
                        } else if (newCounts.video > app.state.cachedDevices.video) {
                            app.utils.showToast("USB Video Detected", "External webcam connected.", "success");
                            activateLight('port-usb', 'text-primary', 'bg-primary');
                        }
                        app.state.cachedDevices = newCounts;
                    };
                    navigator.mediaDevices?.addEventListener('devicechange', window.mediaListener);

                    // 3. Listen for HDMI / External Monitor via Screen/Resize API
                    let lastWidth = window.screen.width;
                    window.screenListener = () => {
                        if(app.state.currentTest !== 'ports') return;
                        // Checking if total screen area changed or using matchMedia for multiple screens
                        if(window.screen.width !== lastWidth || (window.screen.isExtended !== undefined && window.screen.isExtended)) {
                            app.utils.showToast("HDMI / Display Detected", "External monitor connected.", "success");
                            activateLight('port-hdmi', 'text-warning', 'bg-warning');
                            lastWidth = window.screen.width;
                        }
                    };
                    window.addEventListener('resize', window.screenListener);
                },

                playTone: (freq, pan, type='sine', duration=1) => {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const panner = ctx.createStereoPanner();
                    const gain = ctx.createGain();
                    
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    
                    panner.pan.value = (pan === 'left') ? -1 : ((pan === 'right') ? 1 : 0);

                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);

                    osc.connect(panner);
                    panner.connect(gain);
                    gain.connect(ctx.destination);

                    osc.start();
                    osc.stop(ctx.currentTime + duration);
                }
            }
        };

        window.onload = () => {
            // Start on the first test
            app.navigate('battery');
            
            // System Clock Update
            setInterval(() => {
                const el = document.getElementById('system-clock');
                if(el) el.innerText = new Date().toLocaleTimeString('en-US', { hour12: false });
            }, 1000);
        };
    </script>
</body>
