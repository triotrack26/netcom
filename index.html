<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Diagnostic Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        darker: '#020617',
                        panel: '#1e293b',
                        primary: '#3b82f6',
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow: hidden; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Full Keyboard Styles */
        .kbd-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 4px; }
        .key { transition: all 0.1s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); border: 1px solid #475569; border-radius: 4px; background-color: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; color: #94a3b8; user-select: none; }
        .key.active { background-color: #3b82f6; color: white; transform: scale(0.95); box-shadow: none; }
        .key.tested { background-color: #10b981; color: white; border-color: #059669; }
        
        /* Key Sizing */
        .k-std { width: 40px; height: 40px; }
        .k-sm { width: 35px; height: 35px; font-size: 0.65rem; }
        .k-w1 { width: 60px; height: 40px; } /* Tab */
        .k-w2 { width: 75px; height: 40px; } /* Caps */
        .k-w3 { width: 90px; height: 40px; } /* Shift */
        .k-w4 { width: 85px; height: 40px; } /* Enter */
        .k-space { width: 250px; height: 40px; }

        /* Fullscreen Display Test */
        #display-test-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; cursor: pointer; }

        /* Touch Test Canvas */
        #touch-canvas { touch-action: none; background-color: #0f172a; border: 2px dashed #475569; border-radius: 0.5rem; width: 100%; height: 400px; cursor: crosshair; }
    </style>
</head>
<body class="h-screen w-screen flex">

    <nav id="sidebar" class="w-64 bg-dark border-r border-slate-800 flex flex-col h-full z-10 transition-all duration-300">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3 cursor-pointer" onclick="app.navigate('home')">
            <i class="fa-solid fa-screwdriver-wrench text-primary text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wider">Diagnostic<span class="text-primary">Tool</span></h1>
        </div>
        <div class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-2 px-3" id="nav-menu">
                <li><button onclick="app.navigate('home')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-nav="home"><i class="fa-solid fa-house w-5"></i> Select Device</button></li>
                <li class="pt-4 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Active Workspace</li>
                <li><button onclick="app.navigate('laptop')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-nav="laptop"><i class="fa-solid fa-laptop w-5"></i> Laptop Tests</button></li>
                <li><button onclick="app.navigate('desktop')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-nav="desktop"><i class="fa-solid fa-desktop w-5"></i> Desktop Tests</button></li>
                <li><button onclick="app.navigate('server')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-nav="server"><i class="fa-solid fa-server w-5"></i> Server Tests</button></li>
            </ul>
        </div>
        <div class="p-4 border-t border-slate-800 text-xs text-slate-500 text-center">
            Engineer Console v3.0
        </div>
    </nav>

    <main class="flex-1 flex flex-col h-full bg-darker relative overflow-hidden">
        <!-- Topbar -->
        <header id="topbar" class="h-16 bg-dark border-b border-slate-800 flex items-center justify-between px-6 z-10">
            <h2 id="page-title" class="text-xl font-semibold text-slate-100">Select Device</h2>
            <div class="flex items-center gap-4">
                <span id="network-status" class="hidden"></span>
                <span id="system-clock" class="text-sm font-mono text-slate-400">00:00:00</span>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="main-content" class="flex-1 overflow-y-auto p-6 scrollbar-hide">
            <!-- Content gets injected here by JS -->
        </div>
    </main>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Fullscreen Display Test Overlay -->
    <div id="display-test-overlay"></div>

    <script>
        // --- Core Application Logic & State ---
        const app = {
            state: {
                currentView: 'home',
                activeStreams: [], // To hold camera/mic streams to stop them later
                deviceData: {
                    model: '',
                    serial: '',
                    date: '',
                    batteryHealth: ''
                }
            },

            // Navigation mappings
            views: {
                home: () => app.ui.renderHome(),
                laptop: () => app.ui.renderDeviceMenu('laptop', 'Laptop Test Suite'),
                desktop: () => app.ui.renderDeviceMenu('desktop', 'Desktop Test Suite'),
                server: () => app.ui.renderServerMenu(),
                testView: (device, testId) => app.ui.renderActiveTest(device, testId)
            },

            // Test Definitions
            tests: {
                laptop: [
                    { id: 'sysinfo', name: 'System Info & Device ID', icon: 'fa-microchip' },
                    { id: 'battery', name: 'Battery Health', icon: 'fa-battery-half' },
                    { id: 'keyboard', name: 'Full Keyboard Test', icon: 'fa-keyboard' },
                    { id: 'touchpad', name: 'Touchpad / Mouse', icon: 'fa-mouse-pointer' },
                    { id: 'touchscreen', name: 'Touch Screen Test', icon: 'fa-hand-pointer' },
                    { id: 'display', name: 'Display Dead Pixels', icon: 'fa-display' },
                    { id: 'ports', name: 'Live Port Checker', icon: 'fa-usb' },
                    { id: 'camera', name: 'Webcam', icon: 'fa-camera' },
                    { id: 'mic', name: 'Microphone', icon: 'fa-microphone' },
                    { id: 'speaker', name: 'Speakers', icon: 'fa-volume-high' }
                ],
                desktop: [
                    { id: 'sysinfo', name: 'System Info & Device ID', icon: 'fa-microchip' },
                    { id: 'monitor', name: 'Monitor Dead Pixels', icon: 'fa-desktop' },
                    { id: 'keyboard', name: 'Full Keyboard Test', icon: 'fa-keyboard' },
                    { id: 'mouse', name: 'Mouse Tracker', icon: 'fa-mouse' },
                    { id: 'ports', name: 'Live Port Checker', icon: 'fa-usb' },
                    { id: 'mic', name: 'Microphone', icon: 'fa-microphone' },
                    { id: 'speaker', name: 'Audio Output', icon: 'fa-volume-high' }
                ]
            },

            utils: {
                showToast: (msg, type = 'info', duration = 3000) => {
                    const container = document.getElementById('toast-container');
                    const toast = document.createElement('div');
                    const colors = { info: 'bg-blue-600', success: 'bg-emerald-600', error: 'bg-red-600', warning: 'bg-amber-600' };
                    toast.className = `${colors[type]} text-white px-4 py-3 rounded shadow-lg fade-in flex items-center gap-3 border border-white/20`;
                    
                    let icon = 'fa-info-circle';
                    if(type === 'success') icon = 'fa-check-circle';
                    if(type === 'error') icon = 'fa-exclamation-triangle';
                    if(type === 'warning') icon = 'fa-plug'; // Changed for port connection

                    toast.innerHTML = `<i class="fa-solid ${icon} text-lg"></i> <span class="font-medium">${msg}</span>`;
                    container.appendChild(toast);
                    
                    // Add a slight bounce effect if it's a success (like a port connection)
                    if(type === 'success') {
                        toast.style.transform = 'scale(1.05)';
                        setTimeout(() => toast.style.transform = 'scale(1)', 150);
                    }

                    setTimeout(() => {
                        toast.style.opacity = '0';
                        setTimeout(() => toast.remove(), 300);
                    }, duration);
                },
                stopActiveStreams: () => {
                    app.state.activeStreams.forEach(stream => stream.getTracks().forEach(track => track.stop()));
                    app.state.activeStreams = [];
                    // Clean up global listeners
                    if(window.appKeyboardListener) window.removeEventListener('keydown', window.appKeyboardListener);
                    if(window.appKeyboardUpListener) window.removeEventListener('keyup', window.appKeyboardUpListener);
                    if(window.portCheckInterval) clearInterval(window.portCheckInterval);
                }
            },

            navigate: (viewName, params = {}) => {
                app.utils.stopActiveStreams(); // Clean up hardware usage
                app.state.currentView = viewName;
                
                // Update Sidebar Highlighting
                document.querySelectorAll('#nav-menu button').forEach(btn => {
                    btn.classList.remove('bg-primary', 'text-white');
                    btn.classList.add('text-slate-300', 'hover:bg-slate-800');
                    if(btn.dataset.nav === viewName.split('-')[0]) {
                        btn.classList.remove('text-slate-300', 'hover:bg-slate-800');
                        btn.classList.add('bg-primary', 'text-white');
                    }
                });

                const contentDiv = document.getElementById('main-content');
                contentDiv.innerHTML = '<div class="flex h-full items-center justify-center text-slate-500"><i class="fa-solid fa-spinner fa-spin text-4xl"></i></div>';
                
                setTimeout(() => {
                    if(viewName === 'test') {
                        app.views.testView(params.device, params.testId);
                    } else if (app.views[viewName]) {
                        app.views[viewName]();
                    }
                }, 50); // slight delay for smooth transition
            },

            ui: {
                renderHome: () => {
                    document.getElementById('page-title').innerText = "Select Device to Test";
                    
                    document.getElementById('main-content').innerHTML = `
                        <div class="fade-in max-w-5xl mx-auto flex flex-col items-center justify-center min-h-[70vh]">
                            <h2 class="text-3xl font-bold text-white mb-10">What device are you testing today?</h2>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full">
                                <div onclick="app.navigate('laptop')" class="bg-panel p-10 rounded-xl border-2 border-slate-700 hover:border-primary cursor-pointer transition-all group text-center shadow-lg hover:shadow-primary/20 hover:-translate-y-1">
                                    <i class="fa-solid fa-laptop text-7xl text-slate-500 group-hover:text-primary mb-6 transition-colors"></i>
                                    <h3 class="text-2xl font-bold text-white">Laptop</h3>
                                    <p class="text-slate-400 mt-3">Includes battery, touch screen, and integrated peripherals.</p>
                                </div>
                                <div onclick="app.navigate('desktop')" class="bg-panel p-10 rounded-xl border-2 border-slate-700 hover:border-primary cursor-pointer transition-all group text-center shadow-lg hover:shadow-primary/20 hover:-translate-y-1">
                                    <i class="fa-solid fa-desktop text-7xl text-slate-500 group-hover:text-primary mb-6 transition-colors"></i>
                                    <h3 class="text-2xl font-bold text-white">Desktop</h3>
                                    <p class="text-slate-400 mt-3">Focused on external monitors, I/O ports, and standard inputs.</p>
                                </div>
                                <div onclick="app.navigate('server')" class="bg-panel p-10 rounded-xl border-2 border-slate-700 hover:border-primary cursor-pointer transition-all group text-center shadow-lg hover:shadow-primary/20 hover:-translate-y-1">
                                    <i class="fa-solid fa-server text-7xl text-slate-500 group-hover:text-primary mb-6 transition-colors"></i>
                                    <h3 class="text-2xl font-bold text-white">Server</h3>
                                    <p class="text-slate-400 mt-3">Network verification and stress simulation tools.</p>
                                </div>
                            </div>
                        </div>
                    `;
                },

                renderDeviceMenu: (deviceType, title) => {
                    document.getElementById('page-title').innerText = title;
                    const tests = app.tests[deviceType];
                    
                    let html = `<div class="fade-in max-w-6xl mx-auto">
                        <div class="bg-blue-900/20 border border-blue-800 text-blue-300 p-4 rounded-lg flex items-center gap-4 mb-8">
                            <i class="fa-solid fa-circle-info text-2xl"></i>
                            <p><strong>Engineer Instructions:</strong> Work through the tests below. Ensure "System Info" is completed first to identify the device.</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">`;
                    
                    tests.forEach((test, index) => {
                        // Highlight the first test (System Info)
                        const isFirst = index === 0;
                        const borderClass = isFirst ? 'border-primary shadow-lg shadow-primary/10' : 'border-slate-700 hover:border-slate-500';

                        html += `
                            <div onclick="app.navigate('test', {device: '${deviceType}', testId: '${test.id}'})" class="bg-panel border ${borderClass} rounded-xl p-6 cursor-pointer transition-all group flex flex-col items-center text-center">
                                <div class="w-16 h-16 rounded-full bg-dark flex items-center justify-center text-3xl text-slate-400 group-hover:text-primary group-hover:scale-110 transition-all mb-4">
                                    <i class="fa-solid ${test.icon}"></i>
                                </div>
                                <h3 class="text-lg font-bold text-white mb-2">${test.name}</h3>
                            </div>
                        `;
                    });

                    html += `</div></div>`;
                    document.getElementById('main-content').innerHTML = html;
                },

                renderServerMenu: () => {
                    document.getElementById('page-title').innerText = 'Server Diagnostic Tools';
                    
                    document.getElementById('main-content').innerHTML = `
                    <div class="fade-in max-w-4xl mx-auto space-y-6">
                        <div class="bg-panel border border-slate-700 rounded-xl p-6">
                            <h3 class="text-xl font-bold text-white mb-4"><i class="fa-solid fa-network-wired text-primary mr-2"></i> Network Reachability Test</h3>
                            <p class="text-slate-400 text-sm mb-4">Ping target IPs or URLs to verify server outbound connectivity.</p>
                            <div class="flex gap-2 mb-4">
                                <input type="text" id="ping-target" value="https://cloudflare.com" class="flex-1 bg-dark border border-slate-600 rounded px-4 py-3 text-white focus:border-primary outline-none" placeholder="Enter IP or URL...">
                                <button onclick="app.hardwareLogic.testNetwork()" class="px-6 py-3 bg-primary hover:bg-blue-600 text-white rounded font-bold transition">Ping Target</button>
                            </div>
                            <div id="network-log" class="h-48 bg-dark border border-slate-800 rounded p-4 font-mono text-sm text-green-400 overflow-y-auto">
                                Ready to test network connection...
                            </div>
                        </div>

                        <div class="bg-panel border border-slate-700 rounded-xl p-6 text-center text-slate-400">
                            <i class="fa-solid fa-terminal text-5xl mb-4"></i>
                            <h3 class="text-xl font-bold text-white mb-2">Deep Hardware Scan</h3>
                            <p>For deep server component testing (RAM ECC, CPU Stress, RAID Health), please utilize SSH or local IPMI tools. Browsers are sandboxed from direct hypervisor/kernel access.</p>
                        </div>
                    </div>`;
                },

                renderActiveTest: (device, testId) => {
                    const testDef = app.tests[device].find(t => t.id === testId) || {name: 'Test', id: testId};
                    
                    // Custom Topbar for tests to easily go back
                    document.getElementById('page-title').innerHTML = `
                        <button onclick="app.navigate('${device}')" class="px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded text-slate-300 mr-3 transition">
                            <i class="fa-solid fa-arrow-left"></i> Back
                        </button> 
                        <span class="text-white">${testDef.name}</span>
                    `;

                    let testUI = `<div class="text-center text-slate-500 mt-20">Test undefined.</div>`;

                    if (testId === 'sysinfo') testUI = app.testTemplates.sysinfo();
                    else if (testId === 'battery') testUI = app.testTemplates.battery();
                    else if (testId === 'keyboard') testUI = app.testTemplates.fullKeyboard();
                    else if (testId === 'touchpad' || testId === 'mouse') testUI = app.testTemplates.mouse();
                    else if (testId === 'touchscreen') testUI = app.testTemplates.touchscreen();
                    else if (testId === 'display' || testId === 'monitor') testUI = app.testTemplates.display();
                    else if (testId === 'ports') testUI = app.testTemplates.ports();
                    else if (testId === 'camera') testUI = app.testTemplates.camera();
                    else if (testId === 'mic') testUI = app.testTemplates.mic();
                    else if (testId === 'speaker') testUI = app.testTemplates.speaker();

                    document.getElementById('main-content').innerHTML = `
                        <div class="fade-in max-w-5xl mx-auto h-full pb-10">
                            ${testUI}
                        </div>
                    `;

                    // Run initialization logic after rendering HTML
                    setTimeout(() => {
                        if (testId === 'sysinfo') app.hardwareLogic.initSysInfo();
                        else if (testId === 'battery') app.hardwareLogic.initBattery();
                        else if (testId === 'keyboard') app.hardwareLogic.initFullKeyboard();
                        else if (testId === 'touchpad' || testId === 'mouse') app.hardwareLogic.initMouse();
                        else if (testId === 'touchscreen') app.hardwareLogic.initTouchscreen();
                        else if (testId === 'ports') app.hardwareLogic.initPorts();
                    }, 100);
                }
            },

            testTemplates: {
                sysinfo: () => `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-panel border border-slate-700 rounded-xl p-6">
                            <h3 class="text-xl font-bold text-white mb-4 border-b border-slate-700 pb-2"><i class="fa-solid fa-pen-to-square text-primary mr-2"></i> Manual Device Entry</h3>
                            <p class="text-sm text-slate-400 mb-4">Browsers block reading serial numbers. Please enter device details manually from the chassis.</p>
                            
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm text-slate-400 mb-1">Model Name / Number</label>
                                    <input type="text" id="dev-model" class="w-full bg-dark border border-slate-600 rounded px-3 py-2 text-white focus:border-primary outline-none" placeholder="e.g. ThinkPad T14 Gen 2" value="${app.state.deviceData.model}" onchange="app.state.deviceData.model = this.value">
                                </div>
                                <div>
                                    <label class="block text-sm text-slate-400 mb-1">Serial Number (S/N)</label>
                                    <input type="text" id="dev-sn" class="w-full bg-dark border border-slate-600 rounded px-3 py-2 text-white focus:border-primary outline-none font-mono uppercase" placeholder="e.g. PF2X9Y1Z" value="${app.state.deviceData.serial}" onchange="app.state.deviceData.serial = this.value">
                                </div>
                                <div>
                                    <label class="block text-sm text-slate-400 mb-1">Manufacture Date</label>
                                    <input type="date" id="dev-date" class="w-full bg-dark border border-slate-600 rounded px-3 py-2 text-white focus:border-primary outline-none text-sm" value="${app.state.deviceData.date}" onchange="app.state.deviceData.date = this.value">
                                </div>
                            </div>
                        </div>

                        <div class="bg-panel border border-slate-700 rounded-xl p-6">
                            <h3 class="text-xl font-bold text-white mb-4 border-b border-slate-700 pb-2"><i class="fa-solid fa-microchip text-success mr-2"></i> Auto-Detected Specs</h3>
                            <div id="sysinfo-content" class="text-sm font-mono text-green-400 bg-dark p-4 rounded border border-slate-800 h-64 overflow-y-auto whitespace-pre-wrap">Analyzing environment...</div>
                        </div>
                    </div>`,

                battery: () => `
                    <div class="bg-panel border border-slate-700 rounded-xl p-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                            <div class="text-center">
                                <h3 class="text-lg font-bold text-white mb-6">Live Charge Status</h3>
                                <div class="relative w-48 h-24 border-4 border-slate-500 rounded-lg mx-auto mb-4 p-1 flex">
                                    <div class="absolute -right-4 top-1/2 -translate-y-1/2 w-3 h-8 bg-slate-500 rounded-r-md"></div>
                                    <div id="bat-level" class="h-full bg-emerald-500 rounded-sm transition-all duration-1000" style="width: 0%"></div>
                                    <div id="bat-text" class="absolute inset-0 flex items-center justify-center font-bold text-white text-xl z-10 drop-shadow-md">--%</div>
                                </div>
                                <div id="bat-status" class="text-slate-300 font-mono font-bold bg-dark inline-block px-4 py-2 rounded">Status: Analyzing...</div>
                            </div>
                            
                            <div class="bg-dark p-6 rounded-lg border border-slate-700">
                                <h3 class="text-lg font-bold text-white mb-2"><i class="fa-solid fa-notes-medical text-primary mr-2"></i> Battery Health Record</h3>
                                <p class="text-xs text-slate-400 mb-4">Browsers cannot access deep cycle counts or maximum degradation metrics. Please generate a battery report via OS (e.g., <code>powercfg /batteryreport</code>) and log the health percentage here.</p>
                                
                                <label class="block text-sm font-bold text-slate-300 mb-2">Maximum Capacity / Health (%)</label>
                                <div class="flex items-center gap-3">
                                    <input type="number" id="bat-health-input" class="w-32 bg-slate-800 border border-slate-600 rounded px-4 py-3 text-white text-xl text-center focus:border-primary outline-none" placeholder="e.g. 85" value="${app.state.deviceData.batteryHealth}" onchange="app.state.deviceData.batteryHealth = this.value">
                                    <span class="text-xl text-slate-500">%</span>
                                </div>
                            </div>
                        </div>
                    </div>`,

                fullKeyboard: () => `
                    <div class="bg-panel border border-slate-700 rounded-xl p-6 text-center">
                        <p class="mb-6 text-slate-300 font-medium bg-dark inline-block px-4 py-2 rounded">Press every key on the physical keyboard. They will turn <span class="text-success font-bold">Green</span> when successfully registered.</p>
                        
                        <div id="keyboard-container" class="bg-dark p-6 rounded-xl border border-slate-800 inline-block overflow-x-auto max-w-full">
                            <!-- Generated by JS to ensure exact standard layout mapping -->
                        </div>
                        
                        <div class="mt-8 flex justify-center gap-4">
                            <button onclick="app.hardwareLogic.initFullKeyboard()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded transition"><i class="fa-solid fa-rotate-right mr-2"></i> Reset Grid</button>
                        </div>
                    </div>`,

                mouse: () => `
                    <div class="bg-panel border border-slate-700 rounded-xl p-6 text-center">
                        <h3 class="text-xl text-white font-bold mb-4">Input & Tracker Verification</h3>
                        <div id="mouse-area" class="w-full h-80 bg-dark border-2 border-dashed border-slate-600 rounded-lg relative overflow-hidden mb-6 cursor-crosshair flex items-center justify-center flex-col select-none group">
                            <i class="fa-solid fa-computer-mouse text-6xl text-slate-700 mb-4 group-hover:text-slate-500 transition-colors"></i>
                            <p class="text-slate-400 font-medium">Move pointer, Left Click, Right Click, and Scroll rapidly within this box.</p>
                            <div id="mouse-trail" class="absolute w-4 h-4 bg-primary rounded-full pointer-events-none opacity-0 transition-opacity z-10 shadow-[0_0_10px_#3b82f6]"></div>
                        </div>
                        <div class="flex justify-center gap-6 font-mono text-lg">
                            <div id="m-left" class="px-6 py-2 bg-slate-800 rounded text-slate-400 border border-slate-700 transition-colors">Left Click</div>
                            <div id="m-right" class="px-6 py-2 bg-slate-800 rounded text-slate-400 border border-slate-700 transition-colors">Right Click</div>

                initTouchscreen: () => {
                    const canvas = document.getElementById('touch-canvas');
                    if(!canvas) return;
                    
                    const ctx = canvas.getContext('2d');
                    
                    // Resize to fit container
                    const resize = () => {
                        canvas.width = canvas.parentElement.clientWidth - 48; // padding adj
                        canvas.height = 400;
                        ctx.fillStyle = "#0f172a";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    };
                    resize();
                    window.addEventListener('resize', resize);

                    let isDrawing = false;

                    const startPos = (e) => {
                        isDrawing = true;
                        draw(e);
                    };

                    const endPos = () => {
                        isDrawing = false;
                        ctx.beginPath();
                    };

                    const draw = (e) => {
                        if(!isDrawing) return;
                        e.preventDefault(); // stop scrolling
                        
                        ctx.lineWidth = 4;
                        ctx.lineCap = 'round';
                        ctx.strokeStyle = '#3b82f6'; // primary color

                        const rect = canvas.getBoundingClientRect();
                        let clientX = e.clientX;
                        let clientY = e.clientY;
                        
                        // Handle touch events
                        if(e.touches && e.touches.length > 0) {
                            clientX = e.touches[0].clientX;
                            clientY = e.touches[0].clientY;
                        }

                        ctx.lineTo(clientX - rect.left, clientY - rect.top);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(clientX - rect.left, clientY - rect.top);
                    };

                    // Touch events
                    canvas.addEventListener('touchstart', startPos);
                    canvas.addEventListener('touchend', endPos);
                    canvas.addEventListener('touchmove', draw);
                    // Mouse fallback
                    canvas.addEventListener('mousedown', startPos);
                    canvas.addEventListener('mouseup', endPos);
                    canvas.addEventListener('mousemove', draw);
                    
                    app.hardwareLogic.clearCanvas = () => {
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    };
                },

                    navigator.mediaDevices.ondevicechange = async () => {
                        const devices = await navigator.mediaDevices.enumerateDevices();

                            triggerAlert("Media Device Plugged In (Audio/Video)");

                            app.hardwareLogic.playTone(440, 'both', 'sine', 0.1); // Low beep

                        if(video && placeholder) {

                            video.classList.remove('hidden');

                            app.state.activeStreams.push(stream);
                        }

                        app.utils.showToast("Camera access denied or hardware missing.", "error");
                    }
                },

                startMic: async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        app.state.activeStreams.push(stream);
                        
                        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        const analyser = audioContext.createAnalyser();
                        const microphone = audioContext.createMediaStreamSource(stream);
                        microphone.connect(analyser);
                        analyser.fftSize = 64;
                        const bufferLength = analyser.frequencyBinCount;
                        const dataArray = new Uint8Array(bufferLength);
                        
                        const visualizer = document.getElementById('audio-visualizer');
                        if(!visualizer) return;
                        
                        visualizer.innerHTML = '';
                        const bars = [];
                        for(let i=0; i < 20; i++) {
                            const bar = document.createElement('div');
                            bar.className = 'w-full bg-primary rounded-t opacity-90 transition-all duration-75';
                            bar.style.height = '5%';
                            visualizer.appendChild(bar);
                            bars.push(bar);
                        }

                        const updateVisuals = () => {
                            if(app.state.currentView !== 'test' || !app.state.activeStreams.includes(stream)) return;
                            analyser.getByteFrequencyData(dataArray);
                            let step = Math.floor(bufferLength / 20);
                            for(let i=0; i<20; i++) {
                                let val = dataArray[i * step] / 255;
                                bars[i].style.height = `${Math.max(5, val * 100)}%`;
                                bars[i].style.backgroundColor = val > 0.85 ? '#ef4444' : (val > 0.6 ? '#f59e0b' : '#10b981');
                            }
                            requestAnimationFrame(updateVisuals);
                        };
                        updateVisuals();

                    } catch (err) {
                        app.utils.showToast("Microphone access denied or hardware missing.", "error");
                    }
                },

                playTone: (freq, pan, type='sine', duration=1) => {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const panner = ctx.createStereoPanner();
                    const gain = ctx.createGain();
                    
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    
                    if(pan === 'left') panner.pan.value = -1;
                    else if(pan === 'right') panner.pan.value = 1;
                    else panner.pan.value = 0;

                    gain.gain.setValueAtTime(0.5, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);

                    osc.connect(panner);
                    panner.connect(gain);
                    gain.connect(ctx.destination);

                    osc.start();
                    osc.stop(ctx.currentTime + duration);
                }
            }
        };

                const badge = document.getElementById('network-status');
                if (badge) {
                    badge.classList.remove('hidden');
                    if (navigator.onLine) {
                        badge.innerHTML = '<i class="fa-solid fa-wifi mr-1"></i> Online';
                        badge.className = 'px-2 py-1 rounded text-xs font-bold uppercase bg-emerald-500/20 text-emerald-400 border border-emerald-500/50 flex items-center transition-all';
                    } else {
                        badge.innerHTML = '<i class="fa-solid fa-wifi-slash mr-1"></i> Offline Mode';
                        badge.className = 'px-2 py-1 rounded text-xs font-bold uppercase bg-warning/20 text-warning border border-warning/50 flex items-center transition-all fade-in';
                        app.utils.showToast("Offline Mode Active. Hardware tests are fully functional.", "warning");
                    }
                }
            };
            
            window.addEventListener('online', updateNetworkStatus);
            window.addEventListener('offline', updateNetworkStatus);
            updateNetworkStatus();

            // Clock
            setInterval(() => {
                const el = document.getElementById('system-clock');
                if(el) el.innerText = new Date().toLocaleTimeString();
            }, 1000);
        };
    </script>
</body>
</html>
